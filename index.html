<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>

<title>BLINCHIGAMES | Elite Game Library</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

<style>

:root{
--brand:#32ff0e;
--brand-soft:rgba(50,255,14,.1);
--bg-dark:#050505;
--sidebar:#0b0b0b;
--surface:#111;
--surface-hover:#1a1a1a;
--text-main:#fff;
--text-secondary:#888;
--font-main:'Plus Jakarta Sans',sans-serif;
--font-display:'Space Grotesk',sans-serif;
--radius-md:16px;
--transition:cubic-bezier(.4,0,.2,1);
}

body{
background:var(--bg-dark);
color:var(--text-main);
font-family:var(--font-main);
margin:0;
overflow-x:hidden;
}

.app-container{display:flex;min-height:100vh}

.sidebar{
width:280px;
background:var(--sidebar);
border-right:1px solid rgba(255,255,255,.05);
height:100vh;
position:sticky;
top:0;
display:flex;
flex-direction:column;
z-index:1000;
}

.sidebar-header{padding:30px 25px 15px}

.logo{
font-family:var(--font-display);
font-size:1.5rem;
font-weight:800;
color:#fff;
text-decoration:none;
letter-spacing:-1px
}

.logo span{color:var(--brand)}

.search-box{padding:0 15px 15px}

.search-input-wrapper{
background:rgba(255,255,255,.05);
border-radius:12px;
padding:8px 12px;
display:flex;
align-items:center
}

.search-input-wrapper input{
background:transparent;
border:none;
color:white;
font-size:.85rem;
width:100%;
outline:none;
margin-left:8px
}

.menu-scroll{
flex:1;
overflow-y:auto;
padding:10px 15px
}

.menu-label{
font-size:.65rem;
text-transform:uppercase;
letter-spacing:2px;
color:var(--text-secondary);
font-weight:800;
margin:15px 15px 10px
}

.nav-item{
display:flex;
align-items:center;
gap:12px;
padding:12px 18px;
color:var(--text-secondary);
border-radius:12px;
font-weight:600;
font-size:.9rem;
border:none;
background:transparent;
width:100%;
text-align:left
}

.nav-item:hover{color:#fff;background:rgba(255,255,255,.05)}

.nav-item.active{color:var(--brand);background:var(--brand-soft)}

.main-content{flex:1}

.game-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
gap:20px;
padding:20px
}

.elite-grid{
grid-template-columns:repeat(auto-fill,minmax(280px,1fr))
}

.game-card{
background:var(--surface);
border-radius:var(--radius-md);
overflow:hidden;
border:1px solid rgba(255,255,255,.05);
transition:.3s var(--transition);
cursor:pointer
}

.game-card:hover{
transform:translateY(-5px);
border-color:var(--brand)
}

.game-thumb{
aspect-ratio:16/10;
overflow:hidden
}

.game-thumb img{
width:100%;
height:100%;
object-fit:cover
}

.game-info{
padding:12px
}

.game-info h6{
margin:0;
font-size:.85rem;
font-weight:700;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis
}

.badge-elite{
position:absolute;
top:10px;
left:10px;
background:var(--brand);
color:#000;
font-size:.6rem;
font-weight:900;
padding:3px 8px;
border-radius:4px
}

#game-stage{
display:none;
position:fixed;
inset:0;
background:#000;
z-index:1500
}

.stage-header{
height:60px;
display:flex;
align-items:center;
padding:0 20px;
background:#111;
border-bottom:1px solid #222
}

.stage-body{
display:flex;
height:calc(100vh - 60px)
}

.iframe-container{flex:1}

#stage-iframe{
width:100%;
height:100%;
border:none
}

</style>
</head>

<body>

<div class="app-container">

<aside class="sidebar">

<div class="sidebar-header">
<a href="#" class="logo">BLINCHI<span>GAMES</span></a>
</div>

<div class="search-box">
<div class="search-input-wrapper">
<i class="bi bi-search"></i>
<input id="game-search" placeholder="Search across all catalogs...">
</div>
</div>

<div class="menu-scroll">

<div class="menu-label">Featured</div>

<button class="nav-item active" id="btn-home">
<i class="bi bi-house-door"></i> Home
</button>

<div class="menu-label">Categories</div>
<div id="category-nav"></div>

</div>
</aside>

<main class="main-content">

<h2 class="m-4"><i class="bi bi-lightning-charge-fill text-success"></i> Elite Collection</h2>
<div id="elite-games-container" class="game-grid elite-grid"></div>

<h2 class="m-4">Browse Library</h2>
<div id="library-preview" class="game-grid"></div>

</main>

</div>

<div id="game-stage">

<div class="stage-header">
<button class="btn btn-dark btn-sm me-3" onclick="closeGame()">Exit</button>
<span id="active-game-title"></span>
</div>

<div class="stage-body">
<div class="iframe-container">
<iframe id="stage-iframe"></iframe>
</div>
</div>

</div>

<script>

const eliteGames=[
{id:'basketrandom',title:'Basket Random',url:'https://basketrandom.github.io/',thumb:'https://img.gamemonetize.com/9v4n4c7u9r0n0m1a2b3c4d5e6f7g8h9i/512x384.jpg'},
{id:'supermario',title:'Super Mario',url:'https://mukeshkmr776.github.io/super-mario/',thumb:'https://img.gamemonetize.com/ykl7foe8q8olus573dq1zubicm5rbbz2/512x384.jpg'},
{id:'majestic',title:'Majestic Games',url:'https://majesticwafr.github.io',thumb:'https://img.gamemonetize.com/f5mv3cltk9bjta0h3t54c1isiqwlxgf3/512x384.jpg'},
{id:'retrobowl',title:'Retro Bowl',url:'https://game316422.konggames.com/gameframe/index.html?key=316422',thumb:'https://img.gamemonetize.com/497e2c9f9f9e4f0f8a3d5e3f3e3e3e3e/512x384.jpg'}
]

const feeds=[
"rssfeed.php.json",
"rssfeed2.php",
"rssfeed3.php",
"rssfeed4.php",
"rssfeed5.php"
]

let catalog=[]
let loaded=0

const LOAD_BATCH=24

async function init(){

renderElite()

for(const url of feeds){

try{

const r=await fetch(url)
const data=await r.json()

data.forEach(g=>{
if(g && g.id && !catalog.find(x=>x.id===g.id)){
catalog.push(g)
}
})

}catch(e){}

}

loadMore()

}

function renderElite(){

const container=document.getElementById("elite-games-container")

eliteGames.forEach(g=>{
container.innerHTML+=cardHTML(g,true)
})

}

function loadMore(){

const container=document.getElementById("library-preview")

const slice=catalog.slice(loaded,loaded+LOAD_BATCH)

slice.forEach(g=>{
container.innerHTML+=cardHTML(g)
})

loaded+=slice.length

}

function cardHTML(g,elite=false){

return `
<div class="game-card" onclick="openGame('${g.url}','${g.title}')">
<div class="game-thumb">
${elite?'<div class="badge-elite">Elite</div>':''}
<img src="${g.thumb}" loading="lazy">
</div>
<div class="game-info">
<h6>${g.title}</h6>
</div>
</div>
`

}

function openGame(url,title){

document.getElementById("game-stage").style.display="block"
document.getElementById("stage-iframe").src=url
document.getElementById("active-game-title").innerText=title
document.body.style.overflow="hidden"

}

function closeGame(){

document.getElementById("game-stage").style.display="none"
document.getElementById("stage-iframe").src=""
document.body.style.overflow=""

}

window.addEventListener("scroll",()=>{

if(window.innerHeight+window.scrollY>=document.body.offsetHeight-800){

loadMore()

}

})

document.getElementById("game-search").addEventListener("input",e=>{

const q=e.target.value.toLowerCase()

const container=document.getElementById("library-preview")
container.innerHTML=""
loaded=0

catalog
.filter(g=>g.title.toLowerCase().includes(q))
.forEach(g=>{
container.innerHTML+=cardHTML(g)
})

})

window.addEventListener("load",init)

</script>

</body>
</html>
