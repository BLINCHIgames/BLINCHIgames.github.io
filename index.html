<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>BLINCHIGAMES | Elite Game Library</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <!-- Google AdSense -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5157317095946191" crossorigin="anonymous"></script>

    <style>
        :root {
            --brand: #32ff0e;
            --brand-soft: rgba(50, 255, 14, 0.1);
            --bg-dark: #050505;
            --sidebar: #0b0b0b;
            --surface: #111111;
            --surface-hover: #1a1a1a;
            --text-main: #ffffff;
            --text-secondary: #888888;
            --font-main: 'Plus Jakarta Sans', sans-serif;
            --font-display: 'Space Grotesk', sans-serif;
            --radius-lg: 24px;
            --radius-md: 16px;
            --transition: cubic-bezier(0.4, 0, 0.2, 1);
        }

        body { 
            background: var(--bg-dark); 
            color: var(--text-main);
            font-family: var(--font-main);
            margin: 0;
            overflow-x: hidden;
        }

        .app-container { display: flex; min-height: 100vh; }

        /* Sidebar Ad Integration */
        .sidebar {
            width: 300px;
            background: var(--sidebar);
            border-right: 1px solid rgba(255,255,255,0.05);
            height: 100vh;
            position: sticky;
            top: 0;
            display: flex;
            flex-direction: column;
            z-index: 1000;
        }

        .sidebar-header { padding: 30px 25px 15px; }
        .logo { 
            font-family: var(--font-display); 
            font-size: 1.5rem; 
            font-weight: 800; 
            color: #fff; 
            text-decoration: none;
            letter-spacing: -1px;
        }
        .logo span { color: var(--brand); }

        .ad-sidebar-container {
            margin: 15px;
            padding: 10px;
            background: #000;
            border: 1px dashed #333;
            min-height: 250px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            border-radius: 8px;
        }

        .menu-scroll { flex: 1; overflow-y: auto; padding: 10px 15px; scrollbar-width: none; }
        .menu-scroll::-webkit-scrollbar { display: none; }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 18px;
            color: var(--text-secondary);
            text-decoration: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.2s;
            cursor: pointer;
            border: none;
            background: transparent;
            width: 100%;
            text-align: left;
        }
        .nav-item:hover { color: #fff; background: rgba(255,255,255,0.05); }
        .nav-item.active { color: var(--brand); background: var(--brand-soft); }

        .main-content { flex: 1; min-width: 0; position: relative; }

        /* Game Stage with Ads */
        #game-stage { display: none; position: fixed; inset: 0; background: #000; z-index: 1500; }
        .stage-layout { display: flex; flex-direction: column; height: 100vh; }
        .stage-header { height: 60px; display: flex; align-items: center; padding: 0 20px; background: #111; border-bottom: 1px solid #222; justify-content: space-between;}
        
        .stage-body { display: flex; flex: 1; overflow: hidden; }
        .iframe-container { flex: 1; position: relative; background: #000; display: flex; flex-direction: column; }
        #stage-iframe { width: 100%; height: 100%; border: none; }

        .ad-bottom-bar {
            height: 100px;
            background: #0a0a0a;
            display: flex;
            align-items: center;
            justify-content: center;
            border-top: 1px solid #222;
        }

        .ad-side-pillar {
            width: 180px;
            background: #0a0a0a;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
            border-left: 1px solid #222;
        }

        /* Pre-roll Interstitial */
        #ad-interstitial {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            z-index: 3000;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .interstitial-box {
            width: 100%;
            max-width: 600px;
            background: #111;
            padding: 20px;
            border-radius: 20px;
            border: 1px solid var(--brand);
            text-align: center;
        }

        /* Grid System */
        .game-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; padding: 20px; }
        .game-card {
            background: var(--surface);
            border-radius: var(--radius-md);
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.05);
            transition: all 0.3s var(--transition);
            cursor: pointer;
            position: relative;
        }
        .game-card:hover { transform: translateY(-5px); border-color: var(--brand); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .game-thumb { aspect-ratio: 1/1; overflow: hidden; position: relative; }
        .game-thumb img { width: 100%; height: 100%; object-fit: cover; }
        .game-info { padding: 12px; }
        .game-info h6 { margin: 0; font-size: 0.85rem; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        #loading-overlay {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 5000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s;
        }
    </style>
</head>
<body>

<!-- Pre-roll Ad Overlay -->
<div id="ad-interstitial">
    <div class="interstitial-box">
        <h3 class="text-white mb-3">Loading Game Experience...</h3>
        <div id="adsterra-interstitial-slot">
            <!-- PLACE YOUR INTERSTITIAL AD TAG HERE -->
            <div style="width: 100%; height: 250px; background: #222; display: flex; align-items: center; justify-content: center; color: #555;">
                [ Adsterra Banner Zone ]
            </div>
        </div>
        <p class="text-secondary mt-3 small">Game will start in <span id="ad-timer">5</span>s</p>
        <button id="skip-ad-btn" class="btn btn-outline-success btn-sm mt-2" disabled onclick="finishAd()">Skip Ad</button>
    </div>
</div>

<div id="loading-overlay">
    <h2 class="logo mb-4" style="font-size: 3rem;">BLINCHI<span>GAMES</span></h2>
    <div class="spinner-border text-success"></div>
</div>

<div class="app-container">
    <aside class="sidebar">
        <div class="sidebar-header">
            <a href="#" class="logo">BLINCHI<span>GAMES</span></a>
        </div>

        <!-- BIG ADSTERRA SIDEBAR ZONE -->
        <div class="ad-sidebar-container">
            <div>
                <span class="text-secondary small d-block mb-2">SPONSORED</span>
                <!-- INSERT ADSTERRA 160x600 or 300x250 TAG HERE -->
                <div id="adsterra-sidebar">
                    <script type="text/javascript">
                        atOptions = {
                            'key' : 'YOUR_ADSTERRA_KEY_HERE',
                            'format' : 'iframe',
                            'height' : 250,
                            'width' : 300,
                            'params' : {}
                        };
                    </script>
                    <script type="text/javascript" src="//www.highperformanceformat.com/YOUR_AD_ID/invoke.js"></script>
                </div>
            </div>
        </div>
        
        <div class="menu-scroll">
            <button class="nav-item active" onclick="location.reload()">
                <i class="bi bi-house-door"></i> Home
            </button>
            <div id="cat-list"></div>
        </div>
    </aside>

    <main class="main-content">
        <div class="container-fluid py-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="font-display fw-bold text-uppercase italic">Elite Games</h2>
                <div class="badge bg-success">MONETIZED LIVE</div>
            </div>
            <div id="grid-container" class="game-grid"></div>
        </div>
    </main>
</div>

<div id="game-stage">
    <div class="stage-layout">
        <div class="stage-header">
            <div>
                <button class="btn btn-dark btn-sm rounded-pill px-4 fw-bold" onclick="closeGame()">
                    <i class="bi bi-arrow-left"></i> Exit
                </button>
                <span id="active-title" class="ms-3 fw-bold text-uppercase small text-secondary"></span>
            </div>
            <div class="d-none d-md-block">
                <!-- HEADER AD SLOT -->
                <span class="text-secondary tiny me-2">AD:</span>
                <div style="display:inline-block; width: 468px; height: 60px; background: #000; border: 1px solid #333; vertical-align: middle;"></div>
            </div>
        </div>
        <div class="stage-body">
            <div class="iframe-container">
                <iframe id="stage-iframe" src="" allow="autoplay; fullscreen; keyboard" allowfullscreen></iframe>
            </div>
            <div class="ad-side-pillar">
                <span class="text-secondary tiny mb-2">SPONSOR</span>
                <!-- SKYSCRAPER AD -->
                <div style="width: 160px; height: 600px; background: #000; border: 1px solid #333;"></div>
            </div>
        </div>
        <div class="ad-bottom-bar">
            <!-- LEADERBOARD AD -->
            <div style="width: 728px; height: 90px; background: #000; border: 1px solid #333; display: flex; align-items: center; justify-content: center;">
                <span class="text-secondary">Adsterra Leaderboard 728x90</span>
            </div>
        </div>
    </div>
</div>

<script>
    const catalog = [
        { id: 'basketrandom', title: 'Basket Random', url: 'https://basketrandom.github.io/', thumb: 'https://img.gamemonetize.com/9v4n4c7u9r0n0m1a2b3c4d5e6f7g8h9i/512x384.jpg' },
        { id: 'supermario', title: 'Super Mario', url: 'https://mukeshkmr776.github.io/super-mario/', thumb: 'https://img.gamemonetize.com/ykl7foe8q8olus573dq1zubicm5rbbz2/512x384.jpg' },
        { id: 'retrobowl', title: 'Retro Bowl', url: 'https://game316422.konggames.com/gameframe/index.html?key=316422', thumb: 'https://img.gamemonetize.com/497e2c9f9f9e4f0f8a3d5e3f3e3e3e3e/512x384.jpg' },
        { id: 'moto', title: 'Moto X3M', url: 'https://moto-x3m.github.io/', thumb: 'https://img.gamemonetize.com/5u9n4c7u9r0n0m1a2b3c4d5e6f7g8h9i/512x384.jpg' },
        { id: 'drive', title: 'Madalin Stunt Cars 2', url: 'https://madalin-stunt-cars-2.github.io/', thumb: 'https://img.gamemonetize.com/o0v6k9b5l4n2m8a1b3c4d5e6f7g8h9i/512x384.jpg' }
    ];

    function init() {
        const grid = document.getElementById('grid-container');
        catalog.forEach(g => {
            grid.innerHTML += `
                <div class="game-card" onclick="triggerAd('${g.url}', '${g.title.replace(/'/g, "\\'")}')">
                    <div class="game-thumb">
                        <img src="${g.thumb}" alt="${g.title}">
                    </div>
                    <div class="game-info">
                        <h6>${g.title}</h6>
                    </div>
                </div>
            `;
        });

        setTimeout(() => {
            document.getElementById('loading-overlay').style.opacity = '0';
            setTimeout(() => document.getElementById('loading-overlay').style.display = 'none', 500);
        }, 800);
    }

    let pendingUrl = '';
    let pendingTitle = '';

    function triggerAd(url, title) {
        pendingUrl = url;
        pendingTitle = title;
        
        const interstitial = document.getElementById('ad-interstitial');
        interstitial.style.display = 'flex';
        
        let timeLeft = 5;
        const timerText = document.getElementById('ad-timer');
        const skipBtn = document.getElementById('skip-ad-btn');
        
        skipBtn.disabled = true;
        timerText.innerText = timeLeft;

        const countdown = setInterval(() => {
            timeLeft--;
            timerText.innerText = timeLeft;
            if(timeLeft <= 0) {
                clearInterval(countdown);
                skipBtn.disabled = false;
                skipBtn.innerText = "Play Game Now";
            }
        }, 1000);
    }

    function finishAd() {
        document.getElementById('ad-interstitial').style.display = 'none';
        openGame(pendingUrl, pendingTitle);
    }

    function openGame(url, title) {
        document.getElementById('game-stage').style.display = 'block';
        document.getElementById('stage-iframe').src = url;
        document.getElementById('active-title').innerText = `Live: ${title}`;
        document.body.style.overflow = 'hidden';
    }

    function closeGame() {
        document.getElementById('game-stage').style.display = 'none';
        document.getElementById('stage-iframe').src = '';
        document.body.style.overflow = '';
    }

    window.onload = init;
</script>

</body>
</html>
