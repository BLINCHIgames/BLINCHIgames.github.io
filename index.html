<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>BLINCHIGAMES | Elite Portal</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <!-- Google AdSense Main Script -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5157317095946191" crossorigin="anonymous"></script>

    <style>
        :root {
            --brand: #32ff0e;
            --brand-soft: rgba(50, 255, 14, 0.1);
            --bg-dark: #000000;
            --surface: #121212;
            --surface-hover: #1c1c1c;
            --text-main: #ffffff;
            --text-secondary: #a1a1a1;
            --font-main: 'Plus Jakarta Sans', sans-serif;
            --font-display: 'Space Grotesk', sans-serif;
            --radius-lg: 16px;
            --radius-md: 12px;
            --transition: cubic-bezier(0.2, 0, 0, 1);
        }

        body { 
            background: var(--bg-dark); 
            color: var(--text-main);
            font-family: var(--font-main);
            margin: 0;
            overflow-x: hidden;
        }

        /* HEADER & LOGO */
        .navbar {
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding: 15px 0;
        }

        .logo { 
            font-family: var(--font-display); 
            font-size: 1.5rem; 
            font-weight: 800; 
            color: #fff; 
            text-decoration: none;
            letter-spacing: -1px;
        }
        .logo span { color: var(--brand); }

        /* LAYOUT WITH BANNERS */
        .portal-layout {
            display: flex;
            justify-content: center;
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            gap: 20px;
        }

        .ad-column {
            width: 160px;
            flex-shrink: 0;
            display: none; /* Hidden on mobile */
        }

        @media (min-width: 1200px) {
            .ad-column { display: block; }
        }

        .main-content-area {
            flex: 1;
            min-width: 0;
        }

        /* SEARCH BAR */
        .search-container {
            max-width: 600px;
            margin: 40px auto;
            position: relative;
        }
        .search-bar {
            background: var(--surface);
            border: 2px solid rgba(255,255,255,0.05);
            border-radius: 50px;
            padding: 15px 25px 15px 55px;
            color: #fff;
            width: 100%;
            transition: var(--transition);
        }
        .search-bar:focus {
            outline: none;
            border-color: var(--brand);
            box-shadow: 0 0 20px var(--brand-soft);
        }
        .search-icon {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
        }

        /* GAME GRID */
        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
            margin-bottom: 60px;
        }

        .game-card {
            background: var(--surface);
            border-radius: var(--radius-md);
            overflow: hidden;
            transition: var(--transition);
            cursor: pointer;
            border: 1px solid transparent;
            text-decoration: none;
        }
        .game-card:hover {
            transform: translateY(-5px);
            border-color: var(--brand);
            box-shadow: 0 10px 30px rgba(50, 255, 14, 0.15);
        }
        
        .game-thumb {
            width: 100%;
            aspect-ratio: 4/3;
            background: #222;
            overflow: hidden;
            position: relative;
        }
        .game-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .game-info {
            padding: 12px;
        }
        .game-info h3 {
            font-size: 0.95rem;
            margin: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: #fff;
        }

        /* LOADING OVERLAY */
        #loading-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999;
            display: flex; align-items: center; justify-content: center;
            transition: opacity 0.5s;
        }

        /* STAGE */
        #game-stage {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            z-index: 9000;
        }
        .stage-nav {
            height: 60px;
            background: #111;
            display: flex;
            align-items: center;
            padding: 0 20px;
            justify-content: space-between;
        }
        .iframe-wrapper {
            height: calc(100vh - 60px);
            width: 100%;
        }
        #stage-iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .ad-placeholder {
            background: #111;
            border: 1px dashed #333;
            height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            position: sticky;
            top: 100px;
        }
    </style>
</head>
<body>

<div id="loading-overlay">
    <div class="text-center">
        <h1 class="logo mb-3" style="font-size: 3rem;">BLINCHI<span>GAMES</span></h1>
        <div class="spinner-border text-light" role="status"></div>
    </div>
</div>

<nav class="navbar">
    <div class="container d-flex justify-content-between align-items-center">
        <a href="#" class="logo" onclick="location.reload()">BLINCHI<span>GAMES</span></a>
        <div class="d-flex gap-4">
            <a href="https://www.tiktok.com/@blinchigames3" target="_blank" class="text-white text-decoration-none small fw-bold">TIKTOK</a>
            <span class="text-secondary small fw-bold">ELITE PORTAL v2</span>
        </div>
    </div>
</nav>

<div class="portal-layout">
    <!-- LEFT BANNER -->
    <aside class="ad-column">
        <div class="ad-placeholder">
            <script type="text/javascript">
                atOptions = {
                    'key' : '6e1109cad98d336d18e23b0a2087bbc8',
                    'format' : 'iframe',
                    'height' : 300,
                    'width' : 160,
                    'params' : {}
                };
            </script>
            <script type="text/javascript" src="https://www.highperformanceformat.com/6e1109cad98d336d18e23b0a2087bbc8/invoke.js"></script>
        </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main-content-area">
        <div class="search-container">
            <i class="bi bi-search search-icon"></i>
            <input type="text" id="game-search" class="search-bar" placeholder="Search elite library..." oninput="handleSearch()">
        </div>

        <h5 class="mb-4 text-secondary small fw-bold text-uppercase tracking-wider">Elite Collection</h5>
        <div id="game-grid" class="game-grid">
            <!-- Games injected here -->
        </div>
    </main>

    <!-- RIGHT BANNER -->
    <aside class="ad-column">
        <div class="ad-placeholder">
            <script type="text/javascript">
                atOptions = {
                    'key' : '6e1109cad98d336d18e23b0a2087bbc8',
                    'format' : 'iframe',
                    'height' : 300,
                    'width' : 160,
                    'params' : {}
                };
            </script>
            <script type="text/javascript" src="https://www.highperformanceformat.com/6e1109cad98d336d18e23b0a2087bbc8/invoke.js"></script>
        </div>
    </aside>
</div>

<!-- GAME STAGE -->
<div id="game-stage">
    <div class="stage-nav">
        <button class="btn btn-dark btn-sm rounded-pill px-3" onclick="closeGame()">
            <i class="bi bi-arrow-left me-2"></i> Exit Game
        </button>
        <span id="active-game-title" class="fw-bold"></span>
        <div style="width: 100px"></div>
    </div>
    <div class="iframe-wrapper">
        <iframe id="stage-iframe" src="" allow="autoplay; fullscreen; keyboard" allowfullscreen></iframe>
    </div>
</div>

<script>
    const catalog = [
        { id: 'basket', title: 'Basket Random', url: 'https://basketrandom.github.io/', thumb: 'https://img.gamemonetize.com/9v4n4c7u9r0n0m1a2b3c4d5e6f7g8h9i/512x384.jpg' },
        { id: 'mario', title: 'Super Mario', url: 'https://mukeshkmr776.github.io/super-mario/', thumb: 'https://img.gamemonetize.com/ykl7foe8q8olus573dq1zubicm5rbbz2/512x384.jpg' },
        { id: 'majestic', title: 'Majestic Games', url: 'https://majesticwafr.github.io', thumb: 'https://img.gamemonetize.com/f5mv3cltk9bjta0h3t54c1isiqwlxgf3/512x384.jpg' },
        { id: 'retro', title: 'Retro Bowl', url: 'https://game316422.konggames.com/gameframe/index.html?key=316422', thumb: 'https://img.gamemonetize.com/497e2c9f9f9e4f0f8a3d5e3f3e3e3e3e/512x384.jpg' },
        { id: 'death', title: 'Death Loop', url: 'https://itch.io/embed-upload/11266205?color=000000', thumb: 'https://img.itch.zone/aW1nLzE3Njg1NDUyLnBuZw==/315x250%23c/9f%2BFuB.png' },
        { id: 'dungeon', title: 'Die in the Dungeon', url: 'https://itch.io/embed-upload/3796541?color=000000', thumb: 'https://img.itch.zone/aW1nLzUzODU0MzIucG5n/315x250%23c/X%2F%2F%2FRq.png' }
    ];

    function init() {
        renderGrid(catalog);
        setTimeout(() => {
            const overlay = document.getElementById('loading-overlay');
            overlay.style.opacity = '0';
            setTimeout(() => overlay.style.display = 'none', 500);
        }, 800);
    }

    function renderGrid(data) {
        const grid = document.getElementById('game-grid');
        grid.innerHTML = data.map(game => `
            <div class="game-card" onclick="openGame('${game.url}', '${game.title}')">
                <div class="game-thumb">
                    <img src="${game.thumb}" alt="${game.title}" loading="lazy">
                </div>
                <div class="game-info">
                    <h3>${game.title}</h3>
                </div>
            </div>
        `).join('');
    }

    function handleSearch() {
        const query = document.getElementById('game-search').value.toLowerCase().trim();
        const filtered = catalog.filter(g => g.title.toLowerCase().includes(query));
        renderGrid(filtered);
    }

    function openGame(url, title) {
        document.getElementById('game-stage').style.display = 'block';
        document.getElementById('stage-iframe').src = url;
        document.getElementById('active-game-title').innerText = title;
        document.body.style.overflow = 'hidden';
    }

    function closeGame() {
        document.getElementById('game-stage').style.display = 'none';
        document.getElementById('stage-iframe').src = '';
        document.body.style.overflow = '';
    }

    window.addEventListener('load', init);
</script>

</body>
</html>
