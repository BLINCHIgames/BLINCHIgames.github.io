<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>BLINCHIGAMES | Home</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;800&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <!-- Ad Scripts -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5157317095946191" crossorigin="anonymous"></script>
    <script src="https://authoritieswoundjoint.com/be/12/e6/be12e6213defb10285de3a59a17f3b40.js"></script>

    <style>
        :root {
            --brand: #32ff0e;
            --brand-soft: rgba(50, 255, 14, 0.15);
            --bg-dark: #000000; 
            --sidebar: #050505; 
            --surface: #111111; 
            --surface-hover: #1a1a1a;
            --text-main: #ffffff;
            --text-secondary: #aaaaaa;
            --font-main: 'Plus Jakarta Sans', sans-serif;
            --font-display: 'Space Grotesk', sans-serif;
            --radius-lg: 24px;
            --radius-md: 18px;
            --transition: cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            background: var(--bg-dark);
            color: var(--text-main);
            font-family: var(--font-main);
            margin: 0;
            overflow-x: hidden;
        }

        .app-container { display: flex; min-height: 100vh; }

        .sidebar {
            width: 280px;
            background: var(--sidebar);
            border-right: 1px solid rgba(255,255,255,0.05);
            height: 100vh;
            position: sticky;
            top: 0;
            display: flex;
            flex-direction: column;
            z-index: 1000;
        }

        .sidebar-header { padding: 30px 25px 15px; }
        .logo {
            font-family: var(--font-display);
            font-size: 1.6rem;
            font-weight: 800;
            color: #ffffff;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .logo span { color: var(--brand); }

        .search-box { padding: 0 20px 20px; }
        .search-input-wrapper {
            background: var(--surface);
            border-radius: var(--radius-md);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            border: 1px solid transparent;
            transition: 0.2s;
        }
        .search-input-wrapper:focus-within { border-color: var(--brand); }
        .search-input-wrapper input {
            background: transparent;
            border: none;
            color: white;
            width: 100%;
            outline: none;
            margin-left: 10px;
        }

        .menu-scroll { flex: 1; overflow-y: auto; padding: 10px 15px; scrollbar-width: none; }
        .menu-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-secondary);
            font-weight: 800;
            margin: 20px 15px 10px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 18px;
            color: var(--text-secondary);
            text-decoration: none;
            border-radius: var(--radius-md);
            font-weight: 500;
            transition: all 0.2s;
            cursor: pointer;
            border: none;
            background: transparent;
            width: 100%;
            text-align: left;
            margin-bottom: 4px;
        }
        .nav-item:hover { color: #ffffff; background: var(--surface); }
        .nav-item.active { 
            color: #ffffff; 
            background: var(--brand-soft); 
            border-left: 4px solid var(--brand);
            border-radius: 4px var(--radius-md) var(--radius-md) 4px;
        }

        .main-content { flex: 1; min-width: 0; padding: 0 30px; }
        .section-title { font-family: var(--font-display); font-size: 1.5rem; margin-top: 2.5rem; color: #ffffff; }

        .game-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(210px, 1fr)); 
            gap: 24px; 
            padding: 10px 0 30px; 
        }
        .elite-grid { grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); }

        .game-card {
            border-radius: var(--radius-md);
            transition: transform 0.3s var(--transition);
            cursor: pointer;
            display: flex;
            flex-direction: column;
        }
        .game-card:hover { transform: translateY(-5px); }
        
        .game-thumb { 
            aspect-ratio: 16/9; 
            overflow: hidden; 
            border-radius: var(--radius-md);
            background: var(--surface);
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.05);
            position: relative;
        }
        .game-thumb img { width: 100%; height: 100%; object-fit: cover; transition: 0.3s; }

        .game-info { padding: 14px 4px; }
        .game-info h6 { margin: 0; font-size: 1rem; color: var(--text-main); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .badge-elite {
            position: absolute; top: 12px; left: 12px; 
            background: var(--brand); color: #000;
            font-size: 0.7rem; font-weight: 800; padding: 4px 12px; border-radius: 30px;
            z-index: 5;
        }

        #loading-overlay {
            position: fixed; inset: 0; background: var(--bg-dark); z-index: 2000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        #scroll-sentinel { height: 150px; display: flex; align-items: center; justify-content: center; visibility: hidden; width: 100%; }

        #game-stage { display: none; position: fixed; inset: 0; background: var(--bg-dark); z-index: 1500; }
        .stage-header { 
            height: 70px; display: flex; align-items: center; justify-content: space-between;
            padding: 0 24px; background: var(--sidebar); border-bottom: 1px solid rgba(255,255,255,0.05); 
        }

        .stage-body { display: flex; height: calc(100vh - 70px); }
        .game-and-bottom-ad { flex: 1; display: flex; flex-direction: column; }
        .iframe-container { flex: 1; background: #000; }
        #stage-iframe { width: 100%; height: 100%; border: none; }
        
        .ad-sidebar { width: 300px; background: var(--sidebar); border-left: 1px solid rgba(255,255,255,0.05); padding: 20px; overflow-y: auto; text-align: center; }

        @media (max-width: 768px) {
            .app-container { flex-direction: column; }
            .sidebar { width: 100%; height: auto; position: relative; border-right: none; }
            .stage-body { flex-direction: column; }
            .ad-sidebar { width: 100%; border-left: none; border-top: 1px solid rgba(255,255,255,0.05); }
        }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <h2 class="logo mb-4" style="font-size: 3rem;">BLINCHI<span>GAMES</span></h2>
        <div class="spinner-border text-success" style="width: 3rem; height: 3rem;"></div>
        <p class="mt-3 text-secondary">Populating Catalogs...</p>
    </div>

    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <a href="#" class="logo" onclick="location.reload()">
                    <i class="bi bi-controller"></i> BLINCHI<span>GAMES</span>
                </a>
            </div>
            <div class="search-box">
                <div class="search-input-wrapper">
                    <i class="bi bi-search"></i>
                    <input type="text" id="game-search" placeholder="Search games..." oninput="handleSearch()">
                </div>
            </div>
            <div class="menu-scroll">
                <div class="menu-label">Discover</div>
                <button class="nav-item active" id="btn-home" onclick="showSection('home', this)">
                    <i class="bi bi-house"></i> Home
                </button>
                <div class="menu-label">Genres</div>
                <div id="category-list"></div>
            </div>
        </aside>

            <main class="main-content">
            <div id="view-home">
                <h2 class="section-title">Featured Elite</h2>
                <div id="elite-grid" class="game-grid elite-grid"></div>
                <h2 class="section-title" id="lib-title">All Games</h2>
                <div id="home-grid" class="game-grid"></div>
            </div>
            <div id="view-cat" style="display:none">
                <h2 id="cat-title" class="section-title"></h2>
                <div id="cat-grid" class="game-grid"></div>
            </div>
            <div id="scroll-sentinel">
                <div class="spinner-border text-success spinner-border-sm"></div>
            </div>
        </main>
    </div>

    <div id="game-stage">
        <div class="stage-header">
            <div class="header-left">
                <button class="btn btn-dark rounded-pill px-4 fw-bold" onclick="closeGame()">Back</button>
                <span id="active-game-title" class="ms-3 text-white fw-bold text-uppercase small"></span>
            </div>
            <button class="btn btn-success rounded-pill px-4 fw-bold" onclick="toggleFullscreen()">Fullscreen</button>
        </div>
        <div class="stage-body">
            <div class="game-and-bottom-ad">
                <div class="iframe-container" id="game-wrapper">
                    <iframe id="stage-iframe" allow="autoplay; fullscreen; pointer-lock"></iframe>
                </div>
                <div class="p-2 bg-black text-center" style="min-height: 90px;">
                    <!-- Banner Ad Placeholder -->
                    <script async="async" data-cfasync="false" src="https://authoritieswoundjoint.com/6e2b1a830401c523b5ff47a15d91df2c/invoke.js"></script>
                    <div id="container-6e2b1a830401c523b5ff47a15d91df2c"></div>
                </div>
            </div>
            <div class="ad-sidebar">
                <p class="small text-secondary fw-bold">SPONSORED</p>
                <div class="mt-4">
                    <script>atOptions = { 'key' : '6e1109cad98d336d18e23b0a2087bbc8', 'format' : 'iframe', 'height' : 300, 'width' : 160, 'params' : {} };</script>
                    <script src="https://authoritieswoundjoint.com/6e1109cad98d336d18e23b0a2087bbc8/invoke.js"></script>
                </div>
            </div>
        </div>
    </div>

    <script>
        const eliteGames = [
            { id: 'poxel', title: 'Poxel.io', category: 'IO Games', url: 'https://poxel.io/', thumb: '' },
            { id: 'speedstars2', title: 'Speed Stars 2', category: 'Racing', url: 'https://speedstars2.io/', thumb: '' },
            { id: 'basketrandom', title: 'Basket Random', category: 'Sports', url: 'https://basketrandom.github.io/', thumb: 'https://img.gamemonetize.com/9v4n4c7u9r0n0m1a2b3c4d5e6f7g8h9i/512x384.jpg' },
            { id: 'supermario', title: 'Super Mario', category: 'Arcade', url: 'https://mukeshkmr776.github.io/super-mario/', thumb: 'https://img.gamemonetize.com/ykl7foe8q8olus573dq1zubicm5rbbz2/512x384.jpg' }
        ];

        let allGames = [];
        let filteredGames = [];
        let currentLoaded = 0;
        let activeView = 'home';
        const START_COUNT = 100;
        const STEP_COUNT = 20;

        async function init() {
            // Immediately render elite
            const eg = document.getElementById('elite-grid');
            eliteGames.forEach(g => eg.innerHTML += createCardHTML(g, true));

            try {
                // Fetch feeds in parallel
                const feeds = [
                    fetch('embed.json').then(r => r.json()).catch(() => []),
                    fetch('https://gamemonetize.com/feed.php?format=0&page=20').then(r => r.json()).catch(() => [])
                ];

                const results = await Promise.all(feeds);
                
                // Merge Data
                allGames = [...eliteGames];
                
                // Process embed.json
                if (Array.isArray(results[0])) {
                    results[0].forEach(g => {
                        allGames.push({
                            id: 'embed-' + Math.random(),
                            title: g.title,
                            category: g.tags ? g.tags.split(',')[0] : 'Web Game',
                            url: g.embed,
                            thumb: g.image
                        });
                    });
                }

                // Process GameMonetize
                if (Array.isArray(results[1])) {
                    allGames.push(...results[1]);
                }

                // Deduplicate
                const seen = new Set();
                allGames = allGames.filter(g => seen.has(g.title) ? false : seen.add(g.title));

                renderCategories();
                filteredGames = [...allGames];
                loadMore(START_COUNT);
                setupScroll();

            } catch (e) {
                console.error("Feed error", e);
            }

            // Hide loader after short delay for perceived speed
            setTimeout(() => {
                document.getElementById('loading-overlay').style.display = 'none';
            }, 800);
        }

        function renderCategories() {
            const list = document.getElementById('category-list');
            const cats = ['Action', 'Arcade', 'Racing', 'Puzzle', 'Shooting', 'Sports', 'IO Games'];
            list.innerHTML = '';
            cats.forEach(c => {
                const b = document.createElement('button');
                b.className = 'nav-item';
                b.innerHTML = `<i class="bi bi-tag"></i> ${c}`;
                b.onclick = () => showCategory(c, b);
                list.appendChild(b);
            });
        }

        function showSection(type, btn) {
            activeView = type;
            currentLoaded = 0;
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            if(btn) btn.classList.add('active');
            
            document.getElementById('view-home').style.display = type === 'home' ? 'block' : 'none';
            document.getElementById('view-cat').style.display = type === 'cat' ? 'block' : 'none';

            if(type === 'home') {
                filteredGames = [...allGames];
                document.getElementById('home-grid').innerHTML = '';
                loadMore(START_COUNT);
            }
        }

        function showCategory(cat, btn) {
            showSection('cat', btn);
            document.getElementById('cat-title').innerText = cat + " Games";
            const grid = document.getElementById('cat-grid');
            grid.innerHTML = '';
            
            filteredGames = allGames.filter(g => (g.category || '').toLowerCase().includes(cat.toLowerCase()));
            loadMore(START_COUNT);
            window.scrollTo(0,0);
        }

        function handleSearch() {
            const q = document.getElementById('game-search').value.toLowerCase();
            showSection('home', document.getElementById('btn-home'));
            document.getElementById('home-grid').innerHTML = '';
            document.getElementById('lib-title').innerText = q ? `Searching for "${q}"` : "All Games";
            filteredGames = allGames.filter(g => g.title.toLowerCase().includes(q));
            loadMore(START_COUNT);
        }

        function loadMore(amount) {
            const grid = activeView === 'home' ? document.getElementById('home-grid') : document.getElementById('cat-grid');
            const batch = filteredGames.slice(currentLoaded, currentLoaded + amount);
            
            let html = '';
            batch.forEach(g => html += createCardHTML(g));
            grid.insertAdjacentHTML('beforeend', html);
            currentLoaded += batch.length;
            
            document.getElementById('scroll-sentinel').style.visibility = currentLoaded < filteredGames.length ? 'visible' : 'hidden';
        }

        function setupScroll() {
            const observer = new IntersectionObserver(entries => {
                if(entries[0].isIntersecting && currentLoaded < filteredGames.length) {
                    loadMore(STEP_COUNT);
                }
            }, { rootMargin: '200px' });
            observer.observe(document.getElementById('scroll-sentinel'));
        }

        function createCardHTML(g, isElite = false) {
            const thumb = (g.thumb && g.thumb !== "") ? g.thumb : 'https://placehold.co/600x337/111/32ff0e?text=Elite+Game';
            return `
                <div class="game-card" onclick="openGame('${g.url}', '${g.title.replace(/'/g, "\\'")}')">
                    <div class="game-thumb">
                        ${isElite ? '<div class="badge-elite">Elite</div>' : ''}
                        <img src="${thumb}" loading="lazy" onerror="this.src='https://placehold.co/600x337/111/32ff0e?text=Elite+Game'">
                    </div>
                    <div class="game-info">
                        <h6>${g.title}</h6>
                    </div>
                </div>`;
        }

        function openGame(url, title) {
            document.getElementById('game-stage').style.display = 'block';
            document.getElementById('stage-iframe').src = url;
            document.getElementById('active-game-title').innerText = title;
            document.body.style.overflow = 'hidden';
        }

        function closeGame() {
            document.getElementById('game-stage').style.display = 'none';
            document.getElementById('stage-iframe').src = '';
            document.body.style.overflow = '';
        }

        function toggleFullscreen() {
            const w = document.getElementById('game-wrapper');
            if (!document.fullscreenElement) {
                if (w.requestFullscreen) w.requestFullscreen();
                else if (w.webkitRequestFullscreen) w.webkitRequestFullscreen();
            } else {
                if (document.exitFullscreen) document.exitFullscreen();
            }
        }

        window.onload = init;
    </script>
</body>
</html>
