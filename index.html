<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>BLINCHIGAMES | Elite Game Library</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <!-- Google AdSense Main Script -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5157317095946191" crossorigin="anonymous"></script>

    <style>
        :root {
            --brand: #32ff0e;
            --brand-soft: rgba(50, 255, 14, 0.1);
            --bg-dark: #050505;
            --sidebar: #0b0b0b;
            --surface: #111111;
            --surface-hover: #1a1a1a;
            --text-main: #ffffff;
            --text-secondary: #888888;
            --font-main: 'Plus Jakarta Sans', sans-serif;
            --font-display: 'Space Grotesk', sans-serif;
            --radius-lg: 24px;
            --radius-md: 16px;
            --transition: cubic-bezier(0.4, 0, 0.2, 1);
        }

        body { 
            background: var(--bg-dark); 
            color: var(--text-main);
            font-family: var(--font-main);
            margin: 0;
            overflow-x: hidden;
        }

        .app-container { display: flex; min-height: 100vh; }

        /* Sidebar Styling */
        .sidebar {
            width: 280px;
            background: var(--sidebar);
            border-right: 1px solid rgba(255,255,255,0.05);
            height: 100vh;
            position: sticky;
            top: 0;
            display: flex;
            flex-direction: column;
            z-index: 1000;
        }

        .sidebar-header { padding: 30px 25px 15px; }
        .logo { 
            font-family: var(--font-display); 
            font-size: 1.5rem; 
            font-weight: 800; 
            color: #fff; 
            text-decoration: none;
            letter-spacing: -1px;
        }
        .logo span { color: var(--brand); }

        .search-box { padding: 0 15px 15px; }
        .search-input-wrapper {
            position: relative;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 8px 12px;
            display: flex;
            align-items: center;
            border: 1px solid transparent;
            transition: 0.2s;
        }
        .search-input-wrapper:focus-within {
            border-color: var(--brand);
            background: rgba(255,255,255,0.1);
        }
        .search-input-wrapper input {
            background: transparent;
            border: none;
            color: white;
            font-size: 0.85rem;
            width: 100%;
            outline: none;
            margin-left: 8px;
        }

        .menu-scroll { flex: 1; overflow-y: auto; padding: 10px 15px; scrollbar-width: none; }
        .menu-label {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-secondary);
            font-weight: 800;
            margin: 15px 15px 10px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 18px;
            color: var(--text-secondary);
            text-decoration: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.2s;
            cursor: pointer;
            border: none;
            background: transparent;
            width: 100%;
        }
        .nav-item:hover { color: #fff; background: rgba(255,255,255,0.05); }
        .nav-item.active { color: var(--brand); background: var(--brand-soft); }

        /* Main Grid Styling */
        .main-content { flex: 1; min-width: 0; position: relative; }
        .game-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; padding: 20px; }
        .elite-grid { grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); }

        .game-card {
            background: var(--surface);
            border-radius: var(--radius-md);
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.05);
            transition: all 0.3s var(--transition);
            cursor: pointer;
        }
        .game-card:hover { transform: translateY(-5px); border-color: var(--brand); }
        .game-thumb { aspect-ratio: 16/10; overflow: hidden; position: relative; }
        .game-thumb img { width: 100%; height: 100%; object-fit: cover; }
        .game-info { padding: 12px; }
        .game-info h6 { margin: 0; font-size: 0.85rem; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .badge-elite { 
            position: absolute; top: 10px; left: 10px; background: var(--brand); color: #000;
            font-size: 0.6rem; font-weight: 900; padding: 3px 8px; border-radius: 4px; z-index: 10;
        }

        /* Loading Overlay */
        #loading-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 2000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        /* Game Stage Styling (Adsterra Ready) */
        #game-stage { display: none; position: fixed; inset: 0; background: #000; z-index: 1500; }
        .stage-header { height: 60px; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; background: #0b0b0b; border-bottom: 1px solid #1a1a1a; }
        
        .stage-body { display: flex; height: calc(100vh - 60px); width: 100%; }
        
        .ad-sidebar { 
            width: 180px; 
            background: #000; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding-top: 20px;
            overflow: hidden;
        }
        
        .iframe-container { flex: 1; background: #000; position: relative; }
        #stage-iframe { width: 100%; height: 100%; border: none; }

        #scroll-sentinel { height: 100px; display: flex; align-items: center; justify-content: center; color: var(--brand); font-size: 0.7rem; font-weight: bold; }

        @media (max-width: 992px) {
            .ad-sidebar { display: none; }
            .sidebar { width: 80px; }
            .sidebar span, .sidebar .menu-label, .sidebar .search-box { display: none; }
            .nav-item { justify-content: center; }
        }
    </style>
</head>
<body>

<div id="loading-overlay">
    <h2 class="logo mb-4" style="font-size: 3rem;">BLINCHI<span>GAMES</span></h2>
    <div class="spinner-border text-success" role="status"></div>
</div>

<div class="app-container">
    <aside class="sidebar">
        <div class="sidebar-header">
            <a href="#" class="logo" onclick="location.reload()">BLINCHI<span>GAMES</span></a>
        </div>
        <div class="search-box">
            <div class="search-input-wrapper">
                <i class="bi bi-search text-secondary"></i>
                <input type="text" id="game-search" placeholder="Search games..." oninput="handleSearch()">
            </div>
        </div>
        <div class="menu-scroll">
            <div class="menu-label">Menu</div>
            <button class="nav-item active" onclick="showSection('home')"><i class="bi bi-house"></i> <span>Home</span></button>
            <div class="menu-label">Categories</div>
            <div id="category-list"></div>
        </div>
        <!-- Adsterra Native Banner in Sidebar -->
        <div class="p-2 mt-auto">
            <div id="container-6e2b1a830401c523b5ff47a15d91df2c"></div>
        </div>
    </aside>

    <main class="main-content">
        <div id="view-home" class="view-section container-fluid py-4">
            <h2 class="section-title mb-4 font-display fw-bold text-uppercase"><i class="bi bi-lightning-charge-fill text-success"></i> Elite Collection</h2>
            <div id="elite-games-container" class="game-grid elite-grid"></div>

            <h2 class="section-title mt-5 mb-4 font-display fw-bold text-uppercase">Game Library</h2>
            <div id="library-container" class="game-grid"></div>
            <div id="scroll-sentinel">Syncing Data...</div>
        </div>
    </main>
</div>

<!-- Game Stage -->
<div id="game-stage">
    <div class="stage-header">
        <div class="d-flex align-items-center">
            <button class="btn btn-dark btn-sm rounded-pill px-4 me-3" onclick="closeGame()"><i class="bi bi-arrow-left"></i> Exit</button>
            <span id="active-game-title" class="fw-bold text-uppercase small text-secondary"></span>
        </div>
        <button class="btn btn-outline-success btn-sm" onclick="toggleFullscreen()"><i class="bi bi-arrows-fullscreen"></i> Fullscreen</button>
    </div>
    <div class="stage-body">
        <!-- Left Adsterra Sidebar Ad -->
        <div class="ad-sidebar">
            <script type="text/javascript">
                atOptions = { 'key' : '6e1109cad98d336d18e23b0a2087bbc8', 'format' : 'iframe', 'height' : 300, 'width' : 160, 'params' : {} };
            </script>
            <script src="https://authoritieswoundjoint.com/6e1109cad98d336d18e23b0a2087bbc8/invoke.js"></script>
        </div>

        <div class="iframe-container" id="iframe-parent">
            <iframe id="stage-iframe" src="" allowfullscreen></iframe>
        </div>

        <!-- Right Adsterra Sidebar Ad -->
        <div class="ad-sidebar">
            <script type="text/javascript">
                atOptions = { 'key' : '6e1109cad98d336d18e23b0a2087bbc8', 'format' : 'iframe', 'height' : 300, 'width' : 160, 'params' : {} };
            </script>
            <script src="https://authoritieswoundjoint.com/6e1109cad98d336d18e23b0a2087bbc8/invoke.js"></script>
        </div>
    </div>
</div>

<!-- Adsterra Native Banner Logic -->
<script async="async" data-cfasync="false" src="https://authoritieswoundjoint.com/6e2b1a830401c523b5ff47a15d91df2c/invoke.js"></script>

<script>
    // Custom Games from Doc
    const eliteGames = [
        { id: 'basketrandom', title: 'Basket Random', url: 'https://basketrandom.github.io/', thumb: 'https://img.gamemonetize.com/9v4n4c7u9r0n0m1a2b3c4d5e6f7g8h9i/512x384.jpg' },
        { id: 'supermario', title: 'Super Mario', url: 'https://mukeshkmr776.github.io/super-mario/', thumb: 'https://img.gamemonetize.com/ykl7foe8q8olus573dq1zubicm5rbbz2/512x384.jpg' },
        { id: 'majestic', title: 'Majestic Games', url: 'https://majesticwafr.github.io', thumb: 'https://img.gamemonetize.com/f5mv3cltk9bjta0h3t54c1isiqwlxgf3/512x384.jpg' },
        { id: 'marduinoparty', title: 'Marduino Party', url: 'https://www.hackster.io/gatoninja236/marduino-party-1-3dcda7/embed', thumb: 'https://img.gamemonetize.com/kk2f1i1jbnfvg87cu5d6pso2jj0mb7t7/512x384.jpg' },
        { id: 'retrobowl', title: 'Retro Bowl', url: 'https://game316422.konggames.com/gameframe/index.html?key=316422', thumb: 'https://img.gamemonetize.com/497e2c9f9f9e4f0f8a3d5e3f3e3e3e3e/512x384.jpg' },
        { id: 'deathloop', title: 'Death Loop (Danganronpa)', url: 'https://itch.io/embed-upload/11266205?color=000000', thumb: 'https://img.itch.zone/aW1nLzE3Njg1NDUyLnBuZw==/315x250%23c/9f%2BFuB.png' },
        { id: 'dungeon', title: 'Die in the Dungeon', url: 'https://itch.io/embed-upload/3796541?color=000000', thumb: 'https://img.itch.zone/aW1nLzUzODU0MzIucG5n/315x250%23c/X%2F%2F%2FRq.png' },
        { id: 'littlechef', title: 'Little Chef', url: 'https://itch.io/embed-upload/8133544?color=000000', thumb: 'https://img.itch.zone/aW1nLzEyMzk0MTk3LnBuZw==/315x250%23c/W0mO4H.png' }
    ];

    let fullCatalog = [];
    let currentView = [];
    let loadedCount = 0;
    const BATCH_SIZE = 30;

    // Use live APIs for the RSS feed games
    const rssFeeds = [
        'https://api.gamemonetize.com/rssfeed.php?format=json&category=Action&num=100',
        'https://api.gamemonetize.com/rssfeed.php?format=json&category=Driving&num=100',
        'https://api.gamemonetize.com/rssfeed.php?format=json&category=Shooting&num=100',
        'https://api.gamemonetize.com/rssfeed.php?format=json&category=Arcade&num=100'
    ];

    async function init() {
        const eliteContainer = document.getElementById('elite-games-container');
        eliteGames.forEach(g => eliteContainer.innerHTML += createCardHTML(g, true));

        // Loading from RSS
        try {
            const results = await Promise.all(rssFeeds.map(f => fetch(f).then(r => r.json())));
            results.forEach(batch => {
                if(Array.isArray(batch)) fullCatalog.push(...batch);
            });
        } catch(e) { console.error("RSS fetch failed", e); }

        currentView = [...fullCatalog];
        renderCategories();
        loadMore();
        initInfiniteScroll();

        document.getElementById('loading-overlay').style.display = 'none';
    }

    function createCardHTML(g, isElite = false) {
        return `
            <div class="game-card" onclick="openGame('${g.url}', '${g.title.replace(/'/g, "\\'")}')">
                <div class="game-thumb">
                    ${isElite ? '<div class="badge-elite">Elite</div>' : ''}
                    <img src="${g.thumb}" alt="${g.title}" loading="lazy">
                </div>
                <div class="game-info"><h6>${g.title}</h6></div>
            </div>
        `;
    }

    function renderCategories() {
        const cats = ['Action', 'Driving', 'Shooting', 'Arcade', 'Puzzle'];
        const list = document.getElementById('category-list');
        cats.forEach(c => {
            const btn = document.createElement('button');
            btn.className = 'nav-item';
            btn.innerHTML = `<i class="bi bi-tag"></i> <span>${c}</span>`;
            btn.onclick = () => filterCategory(c);
            list.appendChild(btn);
        });
    }

    function filterCategory(c) {
        document.getElementById('library-container').innerHTML = '';
        currentView = fullCatalog.filter(g => g.category && g.category.includes(c));
        loadedCount = 0;
        loadMore();
    }

    function handleSearch() {
        const q = document.getElementById('game-search').value.toLowerCase();
        document.getElementById('library-container').innerHTML = '';
        currentView = fullCatalog.filter(g => g.title.toLowerCase().includes(q));
        loadedCount = 0;
        loadMore();
    }

    function loadMore() {
        const container = document.getElementById('library-container');
        const next = currentView.slice(loadedCount, loadedCount + BATCH_SIZE);
        next.forEach(g => container.innerHTML += createCardHTML(g));
        loadedCount += next.length;
    }

    function initInfiniteScroll() {
        const observer = new IntersectionObserver((entries) => {
            if(entries[0].isIntersecting && loadedCount < currentView.length) loadMore();
        }, { rootMargin: '200px' });
        observer.observe(document.getElementById('scroll-sentinel'));
    }

    function openGame(url, title) {
        document.getElementById('game-stage').style.display = 'block';
        document.getElementById('stage-iframe').src = url;
        document.getElementById('active-game-title').innerText = `Playing: ${title}`;
        document.body.style.overflow = 'hidden';
    }

    function closeGame() {
        document.getElementById('game-stage').style.display = 'none';
        document.getElementById('stage-iframe').src = '';
        document.body.style.overflow = '';
    }

    function toggleFullscreen() {
        const elem = document.getElementById('iframe-parent');
        if (elem.requestFullscreen) {
            elem.requestFullscreen();
        } else if (elem.webkitRequestFullscreen) {
            elem.webkitRequestFullscreen();
        } else if (elem.msRequestFullscreen) {
            elem.msRequestFullscreen();
        }
    }

    window.onload = init;
</script>
</body>
</html>
