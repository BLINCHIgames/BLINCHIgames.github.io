    <!-- Social Ads Frequency Logic -->
    <script>
        (function() {
            const AD_COOLDOWN = 5 * 60 * 1000; // 5 minutes in milliseconds
            const lastAdTime = localStorage.getItem('blinchi_last_social_ad');
            const now = Date.now();
 
            if (!lastAdTime || (now - lastAdTime) > AD_COOLDOWN) {
                const script = document.createElement('script');
                script.src = "https://authoritieswoundjoint.com/be/12/e6/be12e6213defb10285de3a59a17f3b40.js";
                document.head.appendChild(script);
                localStorage.setItem('blinchi_last_social_ad', now);
            }
        })();
    </script>

    <style>
        :root {
            --brand: #32ff0e;
            --brand-soft: rgba(50, 255, 14, 0.15);
            --bg-dark: #000000; 
            --sidebar: #050505; 
            --surface: #111111; 
            --surface-hover: #1a1a1a;
            --text-main: #ffffff;
            --text-secondary: #aaaaaa;
            --font-main: 'Plus Jakarta Sans', sans-serif;
            --font-display: 'Space Grotesk', sans-serif;
            --radius-lg: 24px;
            --radius-md: 18px;
            --transition: cubic-bezier(0.4, 0, 0.2, 1);

        body {
            background: var(--bg-dark);
            color: var(--text-main);
            font-family: var(--font-main);
            margin: 0;
            overflow-x: hidden;
        }
 
        /* Layout Structure */
        .app-container { display: flex; min-height: 100vh; }
 
        .sidebar {
            width: 280px;
            background: var(--sidebar);
            border-right: 1px solid rgba(255,255,255,0.05);
            height: 100vh;
            position: sticky;
            top: 0;
            display: flex;
            flex-direction: column;
            z-index: 1000;
        }
 
        .sidebar-header { padding: 30px 25px 15px; }
        .logo {
            font-family: var(--font-display);
            font-size: 1.6rem;
            font-weight: 800;
            color: #ffffff;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .logo span { color: var(--brand); }
 
        .search-box { padding: 0 20px 20px; }
        .search-input-wrapper {
            background: var(--surface);
            border-radius: var(--radius-md);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            border: 1px solid transparent;
            transition: 0.2s;
        }
        .search-input-wrapper:focus-within { border-color: var(--brand); }
        .search-input-wrapper input {
            background: transparent;
            border: none;
            color: white;
            width: 100%;
            outline: none;
            margin-left: 10px;
            font-size: 0.9rem;
        }
 
        .menu-scroll { flex: 1; overflow-y: auto; padding: 10px 15px; scrollbar-width: none; }
        .menu-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-secondary);
            font-weight: 800;
            margin: 20px 15px 10px;
        }
 
        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 18px;
            color: var(--text-secondary);
            text-decoration: none;
            border-radius: var(--radius-md);
            font-weight: 500;
            transition: all 0.2s;
            cursor: pointer;
            border: none;
            background: transparent;
            width: 100%;
            text-align: left;
            margin-bottom: 4px;
        }
        .nav-item:hover { color: #ffffff; background: var(--surface); }
        .nav-item.active { 
            color: #ffffff; 
            background: var(--brand-soft); 
            border-left: 4px solid var(--brand);
            border-radius: 4px var(--radius-md) var(--radius-md) 4px;
        }
 
        /* Main Content */
        .main-content { flex: 1; min-width: 0; padding: 0 40px; }
        .section-title { font-family: var(--font-display); font-size: 1.75rem; margin-top: 3rem; margin-bottom: 1.5rem; color: #ffffff; }
 
        .game-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); 
            gap: 28px; 
            padding: 10px 0 40px; 
        }
        .elite-grid { grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); }
 
        .game-card {
            border-radius: var(--radius-md);
            transition: transform 0.3s var(--transition);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        .game-card:hover { transform: translateY(-8px); }
        
        .game-thumb { 
            aspect-ratio: 16/9; 
            overflow: hidden; 
            border-radius: var(--radius-md);
            background: var(--surface);
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.05);
            position: relative;
        }
        .game-thumb img { width: 100%; height: 100%; object-fit: cover; transition: 0.4s; }
        .game-card:hover .game-thumb img { transform: scale(1.05); }
 
        .game-info { padding: 15px 5px; }
        .game-info h6 { margin: 0; font-size: 1.05rem; font-weight: 600; color: var(--text-main); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
 
        .badge-elite {
            position: absolute; top: 12px; left: 12px; 
            background: var(--brand); color: #000;
            font-size: 0.7rem; font-weight: 800; padding: 5px 14px; border-radius: 30px;
            z-index: 10; text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(50, 255, 14, 0.4);
        }
 
        #loading-overlay {
            position: fixed; inset: 0; background: #000; z-index: 3000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
 
        #scroll-sentinel { height: 150px; display: flex; align-items: center; justify-content: center; width: 100%; margin-bottom: 50px; }
 
        /* Game Stage (Iframe Player) */
        #game-stage { display: none; position: fixed; inset: 0; background: var(--bg-dark); z-index: 2500; }
        .stage-header { 
            height: 75px; display: flex; align-items: center; justify-content: space-between;
            padding: 0 30px; background: var(--sidebar); border-bottom: 1px solid rgba(255,255,255,0.08); 
        }
 
        .stage-body { display: flex; height: calc(100vh - 75px); }
        .game-area { flex: 1; display: flex; flex-direction: column; background: #000; }
        #stage-iframe { flex: 1; border: none; background: #000; }
        
        .ad-sidebar { 
            width: 320px; background: var(--sidebar); 
            border-left: 1px solid rgba(255,255,255,0.08); 
            padding: 25px; text-align: center; overflow-y: auto;
        }
 
        @media (max-width: 992px) {
            .sidebar { width: 80px; }
            .sidebar-header, .search-box, .menu-label, .nav-item span { display: none; }
            .nav-item { justify-content: center; padding: 15px; }
            .ad-sidebar { display: none; }
        }
    </style>
</head>
<body>

    <script>
        const ELITE_LIST = [
            { title: 'Majestic Games', category: 'Elite', url: 'https://majesticwafr.github.io', thumb: 'https://img.gamemonetize.com/f5mv3cltk9bjta0h3t54c1isiqwlxgf3/512x384.jpg' },
            { title: 'Poxel.io', category: 'Elite IO', url: 'https://poxel.io/', thumb: '' },
            { title: 'Speed Stars 2', category: 'Elite Racing', url: 'https://speedstars2.io/', thumb: '' },
            { title: 'Basket Random', category: 'Elite Sports', url: 'https://basketrandom.github.io/', thumb: 'https://img.gamemonetize.com/9v4n4c7u9r0n0m1a2b3c4d5e6f7g8h9i/512x384.jpg' },
            { title: 'Super Mario', category: 'Elite Arcade', url: 'https://mukeshkmr776.github.io/super-mario/', thumb: 'https://img.gamemonetize.com/ykl7foe8q8olus573dq1zubicm5rbbz2/512x384.jpg' },
            { title: 'Elite Game 1', category: 'Elite', url: 'https://html5.gamedistribution.com/3dbd133d0cd9468bafdf2c9812290f4b/?gd_sdk_referrer_url=https://blinchigames.online', thumb: '' },
            { title: 'Elite Game 2', category: 'Elite', url: 'https://html5.gamedistribution.com/09d017664cad49e9a36d455b3aa046e5/?gd_sdk_referrer_url=https://blinchigames.online', thumb: '' },
            { title: 'Elite Game 3', category: 'Elite', url: 'https://html5.gamedistribution.com/516d6908fbc848bdb89e65a58a43a7dc/?gd_sdk_referrer_url=https://blinchigames.online', thumb: '' },
            { title: 'Elite Game 4', category: 'Elite', url: 'https://html5.gamedistribution.com/9154433d0cd9468bafdf2c9812290f4b/?gd_sdk_referrer_url=https://blinchigames.online', thumb: '' },
            { title: 'Elite Game 5', category: 'Elite', url: 'https://html5.gamedistribution.com/3f4c166817ad4fd4b5b05d9adba22fcd/?gd_sdk_referrer_url=https://blinchigames.online', thumb: '' },
            { title: 'Venge.io', category: 'Elite IO', url: 'https://play.gamepix.com/venge-io/embed?ref=blinchigames.online', thumb: '' },
            { title: 'Elite Game 7', category: 'Elite', url: 'https://html5.gamedistribution.com/791f133d0cd9468bafdf2c9812290f4b/?gd_sdk_referrer_url=https://blinchigames.online', thumb: '' },
            { title: 'Elite Game 8', category: 'Elite', url: 'https://html5.gamedistribution.com/814a06a64232470e86f8099616d6911c/?gd_sdk_referrer_url=https://blinchigames.online', thumb: '' },
            { title: 'BasketBros', category: 'Elite Sports', url: 'https://play.gamepix.com/basketbros/embed?ref=blinchigames.online', thumb: '' },
        ];
 
        let masterCatalog = [];
        let activeFilterList = [];
        let itemsLoaded = 0;
        let viewMode = 'home';
        const PAGE_INIT = 100;
        const PAGE_STEP = 20;
 
        async function boot() {
            // 1. Render Elite UI immediately for speed
            const eg = document.getElementById('elite-grid');
            ELITE_LIST.forEach(g => eg.innerHTML += generateCard(g, true));
 
            // 2. Multi-source parallel fetch
            const feedUrls = [
                'embed.json',
                'rssfeed.php.json',
                'rssfeed2.php',
                'rssfeed3.php',
                'rssfeed4.php',
                'rssfeed5.php',
                'https://gamemonetize.com/feed.php?format=0&page=20'
            ];
 
            const fetches = feedUrls.map(url => 
                fetch(url).then(r => r.json()).catch(err => {
                    console.warn(`Feed failed: ${url}`, err);
                    return [];
                })
            );
 
            const results = await Promise.all(fetches);
            
            // 3. Normalize and Merge
            masterCatalog = [...ELITE_LIST];
            
            results.forEach((data, idx) => {
                if (!Array.isArray(data)) return;
                
                data.forEach(g => {
                    let gameUrl = g.embed || g.url || "";
                    
                    // Force HTTPS to prevent Mixed Content blocking in modern browsers
                    if (gameUrl.startsWith('http://')) {
                        gameUrl = gameUrl.replace('http://', 'https://');
                    }
 
                    // Mapping different feed formats
                    const gameObj = {
                        title: g.title || "Elite Game",
                        url: gameUrl,
                        thumb: g.image || g.thumb || "",
                        category: (g.tags || g.category || "Web Game").split(',')[0]
                    };
                    if (gameObj.url) masterCatalog.push(gameObj);
                });
            });
 
            // 4. Deduplicate
            const seen = new Set();
            masterCatalog = masterCatalog.filter(g => seen.has(g.title) ? false : seen.add(g.title));
 
            // 5. Finalize UI
            initNav();
            activeFilterList = [...masterCatalog];
            renderBatch(PAGE_INIT);
            initObserver();
 
            // Hide loader
            setTimeout(() => { document.getElementById('loading-overlay').style.display = 'none'; }, 500);
        }
 
        function initNav() {
            const container = document.getElementById('cat-nav-container');
            const genres = ['Action', 'Arcade', 'Racing', 'Puzzle', 'Shooting', 'Sports', 'IO Games'];
            genres.forEach(cat => {
                const b = document.createElement('button');
                b.className = 'nav-item';
                b.innerHTML = `<i class="bi bi-caret-right-fill"></i> <span>${cat}</span>`;
                b.onclick = () => filterByGenre(cat, b);
                container.appendChild(b);
            });
        }
 
        function filterByGenre(genre, btn) {
            viewMode = 'cat';
            itemsLoaded = 0;
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            btn.classList.add('active');
            
            document.getElementById('view-home').style.display = 'none';
            document.getElementById('view-cat').style.display = 'block';
            document.getElementById('cat-display-title').innerText = genre + " Collection";
            document.getElementById('cat-grid').innerHTML = '';
            
            activeFilterList = masterCatalog.filter(g => 
                (g.category || '').toLowerCase().includes(genre.toLowerCase())
            );
            
            renderBatch(PAGE_INIT);
            window.scrollTo(0,0);
        }
 
        function showSection(type, btn) {
            viewMode = 'home';
            itemsLoaded = 0;
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('view-home').style.display = 'block';
            document.getElementById('view-cat').style.display = 'none';
            document.getElementById('home-grid').innerHTML = '';
            activeFilterList = [...masterCatalog];
            document.getElementById('game-search').value = '';
            document.getElementById('main-lib-title').innerText = "Global Library";
            renderBatch(PAGE_INIT);
        }
 
        function handleSearch() {
            const query = document.getElementById('game-search').value.toLowerCase();
            
            // Setup the view manually to prevent showSection state collision
            viewMode = 'home';
            itemsLoaded = 0;
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('btn-home').classList.add('active');
            
            document.getElementById('view-home').style.display = 'block';
            document.getElementById('view-cat').style.display = 'none';
            document.getElementById('home-grid').innerHTML = '';
            
            document.getElementById('main-lib-title').innerText = query ? `Search Results: "${query}"` : "Global Library";
            activeFilterList = masterCatalog.filter(g => g.title.toLowerCase().includes(query));
            renderBatch(PAGE_INIT);
        }
 
        function renderBatch(count) {
            const grid = viewMode === 'home' ? document.getElementById('home-grid') : document.getElementById('cat-grid');
            const batch = activeFilterList.slice(itemsLoaded, itemsLoaded + count);
            
            let html = '';
            batch.forEach(g => html += generateCard(g));
            grid.insertAdjacentHTML('beforeend', html);
            
            itemsLoaded += batch.length;
            document.getElementById('scroll-sentinel').style.visibility = 
                itemsLoaded < activeFilterList.length ? 'visible' : 'hidden';
        }
 
        function initObserver() {
            const obs = new IntersectionObserver(e => {
                if(e[0].isIntersecting && itemsLoaded < activeFilterList.length) {
                    renderBatch(PAGE_STEP);
                }
            }, { rootMargin: '400px' });
            obs.observe(document.getElementById('scroll-sentinel'));
        }
 
        function generateCard(g, isElite = false) {
            const img = (g.thumb && g.thumb !== "") ? g.thumb : 'https://placehold.co/600x337/111/32ff0e?text=Elite+Game';
            return `
                <div class="game-card" onclick="launchGame('${g.url}', '${g.title.replace(/'/g, "\\'")}')">
                    <div class="game-thumb">
                        ${isElite ? '<div class="badge-elite">Elite</div>' : ''}
                        <img src="${img}" loading="lazy" onerror="this.src='https://placehold.co/600x337/111/32ff0e?text=Elite+Game'">
                    </div>
                    <div class="game-info">
                        <h6>${g.title}</h6>
                    </div>
                </div>`;
        }
 
        function launchGame(url, title) {
            document.getElementById('game-stage').style.display = 'block';
            document.getElementById('stage-iframe').src = url;
            document.getElementById('stage-title').innerText = "PLAYING: " + title;
            document.body.style.overflow = 'hidden';
        }
 
        function closeGame() {
            document.getElementById('game-stage').style.display = 'none';
            document.getElementById('stage-iframe').src = '';
            document.body.style.overflow = '';
        }
 
        function toggleFullscreen() {
            const ifr = document.getElementById('stage-iframe');
            if (ifr.requestFullscreen) ifr.requestFullscreen();
            else if (ifr.webkitRequestFullscreen) ifr.webkitRequestFullscreen();
            else if (ifr.msRequestFullscreen) ifr.msRequestFullscreen();
        }
 
        window.onload = boot;
    </script>
</body>
