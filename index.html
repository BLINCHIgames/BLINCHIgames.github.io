<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>BLINCHIGAMES | Home</title>

    <!-- UI Frameworks & Fonts -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;800&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <!-- Google AdSense Main Script -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5157317095946191" crossorigin="anonymous"></script>

    <style>
        :root {
            /* True Black Theme with Green/White Highlights */
            --brand: #32ff0e;
            --brand-soft: rgba(50, 255, 14, 0.15);
            --bg-dark: #000000; 
            --sidebar: #050505; 
            --surface: #111111; 
            --surface-hover: #1a1a1a;
            --text-main: #ffffff;
            --text-secondary: #aaaaaa;
            --font-main: 'Plus Jakarta Sans', sans-serif;
            --font-display: 'Space Grotesk', sans-serif;
            --radius-lg: 24px;
            --radius-md: 18px;
            --transition: cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            background: var(--bg-dark);
            color: var(--text-main);
            font-family: var(--font-main);
            margin: 0;
            overflow-x: hidden;
        }

        .app-container { display: flex; min-height: 100vh; }

        .sidebar {
            width: 280px;
            background: var(--sidebar);
            border-right: 1px solid rgba(255,255,255,0.05);
            height: 100vh;
            position: sticky;
            top: 0;
            display: flex;
            flex-direction: column;
            z-index: 1000;
        }

        .sidebar-header { padding: 30px 25px 15px; }
        .logo {
            font-family: var(--font-display);
            font-size: 1.6rem;
            font-weight: 800;
            color: #ffffff;
            text-decoration: none;
            letter-spacing: -1px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .logo span { color: var(--brand); }

        .search-box { padding: 0 20px 20px; }
        .search-input-wrapper {
            position: relative;
            background: var(--surface);
            border-radius: var(--radius-md);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            border: 1px solid transparent;
            transition: 0.2s;
        }
        .search-input-wrapper:focus-within {
            border-color: var(--brand);
            background: var(--surface-hover);
        }
        .search-input-wrapper input {
            background: transparent;
            border: none;
            color: white;
            font-size: 0.9rem;
            width: 100%;
            outline: none;
            margin-left: 10px;
        }
        .search-input-wrapper i { color: var(--text-secondary); }

        .menu-scroll { flex: 1; overflow-y: auto; padding: 10px 15px; scrollbar-width: none; }
        .menu-scroll::-webkit-scrollbar { display: none; }

        .menu-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-secondary);
            font-weight: 800;
            margin: 20px 15px 10px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 18px;
            color: var(--text-secondary);
            text-decoration: none;
            border-radius: var(--radius-md);
            font-weight: 500;
            font-size: 0.95rem;
            transition: all 0.2s;
            cursor: pointer;
            border: none;
            background: transparent;
            width: 100%;
            text-align: left;
            margin-bottom: 4px;
        }
        .nav-item:hover { color: #ffffff; background: var(--surface); }
        .nav-item.active { 
            color: #ffffff; 
            background: var(--brand-soft); 
            border-left: 4px solid var(--brand);
            border-radius: 4px var(--radius-md) var(--radius-md) 4px;
            font-weight: 600;
        }
        .nav-item.active i { color: var(--brand); }

        .main-content { flex: 1; min-width: 0; position: relative; padding: 0 30px; }
        
        .section-title {
            font-family: var(--font-display);
            font-size: 1.5rem;
            letter-spacing: -0.5px;
            margin-top: 2.5rem;
            color: #ffffff;
        }

        .game-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(210px, 1fr)); 
            gap: 24px; 
            padding: 10px 0 30px; 
        }
        .elite-grid { grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); }

        .game-card {
            background: transparent;
            border-radius: var(--radius-md);
            transition: transform 0.3s var(--transition), box-shadow 0.3s;
            cursor: pointer;
            position: relative;
            display: flex;
            flex-direction: column;
        }
        .game-card:hover { transform: translateY(-5px); z-index: 2; }
        .game-card:hover h6 { color: var(--brand); }
        
        .game-thumb { 
            aspect-ratio: 16/9; 
            overflow: hidden; 
            position: relative; 
            border-radius: var(--radius-md);
            background: var(--surface);
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.05);
        }
        .game-thumb img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            transition: transform 0.5s ease;
        }
        .game-card:hover .game-thumb img {
            transform: scale(1.1);
        }

        .game-info { padding: 14px 4px; }
        .game-info h6 { 
            margin: 0; 
            font-size: 1.05rem; 
            font-weight: 600; 
            color: var(--text-main);
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis; 
        }
        .game-category-label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-top: 6px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .badge-elite {
            position: absolute; 
            top: 12px; 
            left: 12px; 
            background: var(--brand); 
            color: #000;
            font-size: 0.7rem; 
            font-weight: 800; 
            padding: 4px 12px; 
            border-radius: 30px; 
            text-transform: uppercase;
            z-index: 2;
            box-shadow: 0 4px 12px rgba(50, 255, 14, 0.3);
        }

        #loading-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-dark); z-index: 2000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.6s ease;
        }

        #scroll-sentinel { height: 120px; width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .sync-status { font-size: 0.75rem; color: var(--text-secondary); margin-top: 12px; }

        #game-stage { display: none; position: fixed; inset: 0; background: var(--bg-dark); z-index: 1500; }
        .stage-header { 
            height: 70px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between;
            padding: 0 24px; 
            background: var(--sidebar); 
            border-bottom: 1px solid rgba(255,255,255,0.05); 
        }
        
        .header-left { display: flex; align-items: center; gap: 15px; }
        .btn-fullscreen { 
            background: var(--brand); 
            color: #000; 
            border: none; 
            font-weight: 800; 
            border-radius: 30px;
            padding: 8px 20px;
        }
        .btn-fullscreen:hover { background: #fff; transform: scale(1.05); }

        .stage-body { display: flex; height: calc(100vh - 70px); flex-direction: row; }
        
        .game-and-bottom-ad { flex: 1; display: flex; flex-direction: column; background: #000; }
        .iframe-container { flex: 1; position: relative; background: #000; }
        #stage-iframe { width: 100%; height: 100%; border: none; }
        
        .bottom-ad-container {
            min-height: 120px;
            background: var(--sidebar);
            border-top: 1px solid rgba(255,255,255,0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
            flex-shrink: 0;
        }

        .ad-sidebar {
            width: 280px; 
            background: var(--sidebar);
            border-left: 1px solid rgba(255,255,255,0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
            gap: 30px;
            overflow-y: auto;
        }

        .ad-label {
            font-size: 0.65rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: -15px;
        }

        .rounded-pill-custom {
            border-radius: 30px !important;
        }

        @media (max-width: 768px) {
            .app-container { flex-direction: column; }
            .sidebar { width: 100%; height: auto; position: relative; border-right: none; }
            .menu-scroll { display: flex; overflow-x: auto; padding: 10px; }
            .menu-label { display: none; }
            .nav-item { white-space: nowrap; margin-right: 10px; padding: 10px 15px; }
            .stage-body { flex-direction: column; }
            .ad-sidebar { width: 100%; height: auto; flex-direction: row; border-left: none; }
        }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <div class="text-center">
            <h2 class="logo mb-4" style="font-size: 3.5rem; justify-content: center;">BLINCHI<span>GAMES</span></h2>
            <div class="spinner-border" style="color: var(--brand); width: 3rem; height: 3rem; border-width: .35em;" role="status"></div>
            <p class="text-secondary mt-3 small text-white opacity-75">Syncing Elite Library...</p>
        </div>
    </div>

    <div class="app-container">
        <aside id="main-sidebar" class="sidebar">
            <div class="sidebar-header">
                <a href="#" class="logo" onclick="showSection('home', document.getElementById('btn-nav-home'))">
                    <i class="bi bi-controller text-white"></i> BLINCHI<span>GAMES</span>
                </a>
            </div>
            <div class="search-box">
                <div class="search-input-wrapper">
                    <i class="bi bi-search"></i>
                    <input type="text" id="game-search" placeholder="Search games..." oninput="handleSearch()">
                </div>
            </div>
            <div class="menu-scroll">
                <div class="menu-label">Discover</div>
                <button class="nav-item active" id="btn-nav-home" onclick="showSection('home', this)">
                    <i class="bi bi-house-door-fill"></i> Home
                </button>
                <div class="menu-label">Genres</div>
                <div id="category-nav-list"></div>
                <div class="menu-label">Socials</div>
                <a href="https://www.tiktok.com/@blinchigames3?lang=en" target="_blank" class="nav-item">
                    <i class="bi bi-tiktok"></i> TikTok
                </a>
            </div>
        </aside>

        <main class="main-content">
            <div id="view-home" class="view-section py-4">
                <h2 class="section-title fw-bold mb-4">Featured Elite</h2>
                <div id="elite-games-container" class="game-grid elite-grid mb-5"></div>
                <h2 class="section-title fw-bold mb-4" id="main-library-title">All Games</h2>
                <div id="library-preview" class="game-grid"></div>
            </div>
            <div id="view-category" class="view-section py-4" style="display:none">
                <h2 id="category-title" class="section-title fw-bold mb-4"></h2>
                <div id="category-games-container" class="game-grid"></div>
            </div>
            <div id="scroll-sentinel">
                <div class="spinner-border spinner-border-sm" style="color: var(--brand);" role="status"></div>
                <div class="sync-status" id="bg-sync-info">Loading more games...</div>
            </div>
        </main>
    </div>

    <div id="game-stage">
        <div class="stage-header">
            <div class="header-left">
                <button class="btn btn-dark btn-sm rounded-pill-custom px-4 fw-bold" onclick="closeGame()">
                    <i class="bi bi-chevron-left"></i> Back
                </button>
                <span id="active-game-title" class="fw-bold text-uppercase small text-white ms-3"></span>
            </div>
            <button class="btn btn-sm rounded-pill-custom px-4 btn-fullscreen" onclick="toggleFullscreen()">
                <i class="bi bi-arrows-fullscreen"></i> Fullscreen
            </button>
        </div>
        <div class="stage-body">
            <div class="game-and-bottom-ad">
                <div class="iframe-container" id="game-iframe-wrapper">
                    <iframe id="stage-iframe" src="" allow="autoplay; fullscreen; keyboard; pointer-lock" allowfullscreen></iframe>
                </div>
                <div class="bottom-ad-container">
                    <script async="async" data-cfasync="false" src="https://authoritieswoundjoint.com/6e2b1a830401c523b5ff47a15d91df2c/invoke.js"></script>
                    <div id="container-6e2b1a830401c523b5ff47a15d91df2c"></div>
                </div>
            </div>
            <div class="ad-sidebar">
                <div class="ad-label">Advertisement</div>
                <div class="scaled-banner">
                    <script>
                      atOptions = { 'key' : '6e1109cad98d336d18e23b0a2087bbc8', 'format' : 'iframe', 'height' : 300, 'width' : 160, 'params' : {} };
                    </script>
                    <script src="https://authoritieswoundjoint.com/6e1109cad98d336d18e23b0a2087bbc8/invoke.js"></script>
                </div>
            </div>
        </div>
    </div>

    <script type="text/javascript" src="https://authoritieswoundjoint.com/be/12/e6/be12e6213defb10285de3a59a17f3b40.js"></script>

    <script>
        const eliteGames = [
            { id: 'poxel', title: 'Poxel.io', category: 'IO Games', url: 'https://poxel.io/', thumb: '' },
            { id: 'speedstars2', title: 'Speed Stars 2', category: 'Racing', url: 'https://speedstars2.io/', thumb: '' },
            { id: 'basketrandom', title: 'Basket Random', category: 'Sports', url: 'https://basketrandom.github.io/', thumb: 'https://img.gamemonetize.com/9v4n4c7u9r0n0m1a2b3c4d5e6f7g8h9i/512x384.jpg' },
            { id: 'supermario', title: 'Super Mario', category: 'Arcade', url: 'https://mukeshkmr776.github.io/super-mario/', thumb: 'https://img.gamemonetize.com/ykl7foe8q8olus573dq1zubicm5rbbz2/512x384.jpg' },
            { id: 'majestic', title: 'Majestic Games', category: 'Action', url: 'https://majesticwafr.github.io', thumb: 'https://img.gamemonetize.com/f5mv3cltk9bjta0h3t54c1isiqwlxgf3/512x384.jpg' }
        ];

        let rawFeedData = [];
        let fullCatalog = [];
        let currentFilteredView = [];
        let activeView = 'home';
        let loadedCount = 0;

        const INITIAL_LOAD = 100;
        const SCROLL_BATCH = 20;

        const feeds = [
            'embed.json', // Your uploaded embed file
            'rssfeed.php.json', 'rssfeed2.php', 'rssfeed3.php', 'rssfeed4.php', 'rssfeed5.php',
            'https://gamemonetize.com/feed.php?format=0&page=20'
        ];
        
        const seenIds = new Set(eliteGames.map(g => g.id));

        async function init() {
            const eliteContainer = document.getElementById('elite-games-container');
            eliteGames.forEach(g => eliteContainer.innerHTML += createCardHTML(g, true));

            const fetchPromises = feeds.map(url => 
                fetch(url)
                    .then(r => r.json())
                    .catch(() => [])
            );
            
            const results = await Promise.all(fetchPromises);
            
            results.forEach((data, index) => { 
                if (Array.isArray(data)) {
                    // Normalize embed.json data if needed
                    if(feeds[index] === 'embed.json') {
                        data = data.map(g => ({
                            id: g.title.toLowerCase().replace(/\s/g, '-'),
                            title: g.title,
                            category: g.tags ? g.tags.split(',')[0] : 'Web Game',
                            url: g.embed,
                            thumb: g.image
                        }));
                    }
                    rawFeedData.push(...data); 
                }
            });

            processData();
            currentFilteredView = [...fullCatalog];
            loadMoreGames('library-preview', INITIAL_LOAD);

            renderMenu();
            initInfiniteScroll();

            setTimeout(() => {
                document.getElementById('loading-overlay').style.opacity = '0';
                setTimeout(() => document.getElementById('loading-overlay').style.display = 'none', 600);
            }, 1000);
        }

        function processData() {
            rawFeedData.forEach(g => {
                if (g && g.title && !seenIds.has(g.id || g.title)) {
                    if(!g.category) g.category = "Web Game"; 
                    fullCatalog.push(g);
                    seenIds.add(g.id || g.title);
                }
            });
        }

        function renderMenu() {
            const menu = document.getElementById('category-nav-list');
            const cats = ['Action', 'Arcade', 'Racing', 'Puzzle', 'Shooting', 'Sports', 'IO Games'];
            cats.forEach(cat => {
                const btn = document.createElement('button');
                btn.className = 'nav-item';
                btn.innerHTML = `<span>${cat}</span>`;
                btn.onclick = function() { showCategory(cat, this); };
                menu.appendChild(btn);
            });
        }

        function handleSearch() {
            const query = document.getElementById('game-search').value.toLowerCase().trim();
            showSection('home', document.getElementById('btn-nav-home'));
            const container = document.getElementById('library-preview');
            container.innerHTML = '';

            if (query === "") {
                document.getElementById('main-library-title').innerText = "All Games";
                currentFilteredView = [...fullCatalog];
            } else {
                document.getElementById('main-library-title').innerText = `Results for "${query}"`;
                currentFilteredView = fullCatalog.filter(g => g.title.toLowerCase().includes(query));
            }

            loadedCount = 0;
            loadMoreGames('library-preview', INITIAL_LOAD);
        }

        function showSection(section, btnElement) {
            activeView = section;
            document.querySelectorAll('.view-section').forEach(v => v.style.display = 'none');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            if(btnElement) btnElement.classList.add('active');
            if(section === 'home') document.getElementById('view-home').style.display = 'block';
        }

        function showCategory(cat, btnElement) {
            showSection('category', btnElement);
            document.getElementById('game-search').value = "";
            const container = document.getElementById('category-games-container');
            document.getElementById('category-title').innerText = cat + " Games";
            container.innerHTML = '';

            currentFilteredView = fullCatalog.filter(g => {
                let catName = (g.category || '').toLowerCase();
                if(cat.toLowerCase() === 'racing' && catName.includes('driving')) return true; 
                return catName.includes(cat.toLowerCase());
            });

            loadedCount = 0;
            loadMoreGames('category-games-container', INITIAL_LOAD);
            window.scrollTo(0,0);
        }

        function loadMoreGames(containerId, limit) {
            const container = document.getElementById(containerId);
            if (!container) return;

            const nextBatch = currentFilteredView.slice(loadedCount, loadedCount + limit);
            if (nextBatch.length === 0 && loadedCount === 0) {
                container.innerHTML = '<div class="text-secondary p-4">No games found in this category yet.</div>';
                document.getElementById('scroll-sentinel').style.visibility = 'hidden';
                return;
            }

            if (nextBatch.length === 0) {
                document.getElementById('scroll-sentinel').style.visibility = 'hidden';
                return;
            }

            document.getElementById('scroll-sentinel').style.visibility = 'visible';
            let html = '';
            nextBatch.forEach(g => html += createCardHTML(g));
            container.insertAdjacentHTML('beforeend', html);
            loadedCount += nextBatch.length;

            if (loadedCount >= currentFilteredView.length) {
                document.getElementById('scroll-sentinel').style.visibility = 'hidden';
            }
        }

        function initInfiniteScroll() {
            const sentinel = document.getElementById('scroll-sentinel');
            const observer = new IntersectionObserver((entries) => {
                if (entries[0].isIntersecting && loadedCount < currentFilteredView.length) {
                    const targetId = activeView === 'home' ? 'library-preview' : 'category-games-container';
                    loadMoreGames(targetId, SCROLL_BATCH);
                }
            }, { rootMargin: '400px' });
            observer.observe(sentinel);
        }

        function createCardHTML(game, isElite = false) {
            let catLabel = game.category || "Web Game";
            if(catLabel.toLowerCase() === "driving") catLabel = "Racing";

            // If thumb is empty, use the placeholder that says "Elite Game"
            const thumbSrc = (game.thumb && game.thumb !== "") 
                ? game.thumb 
                : `https://placehold.co/600x337/111111/32ff0e?text=Elite+Game`;

            return `
                <div class="game-card" onclick="openGame('${game.url}', '${game.title.replace(/'/g, "\\'")}')">
                    <div class="game-thumb">
                        ${isElite ? '<div class="badge-elite">Elite</div>' : ''}
                        <img src="${thumbSrc}" alt="${game.title}" loading="lazy" onerror="this.src='https://placehold.co/600x337/111111/32ff0e?text=Elite+Game'">
                    </div>
                    <div class="game-info">
                        <h6>${game.title}</h6>
                        <div class="game-category-label">
                            <i class="bi bi-tag-fill" style="font-size: 0.6rem;"></i>
                            ${catLabel}
                        </div>
                    </div>
                </div>
            `;
        }

        function openGame(url, title) {
            document.getElementById('game-stage').style.display = 'block';
            document.getElementById('stage-iframe').src = url;
            document.getElementById('active-game-title').innerText = title;
            document.body.style.overflow = 'hidden';
        }

        function closeGame() {
            if (document.fullscreenElement) document.exitFullscreen().catch(() => {});
            document.getElementById('game-stage').style.display = 'none';
            document.getElementById('stage-iframe').src = '';
            document.body.style.overflow = '';
        }

        function toggleFullscreen() {
            const gameWrapper = document.getElementById('game-iframe-wrapper');
            if (!document.fullscreenElement) {
                if (gameWrapper.requestFullscreen) {
                    gameWrapper.requestFullscreen();
                } else if (gameWrapper.webkitRequestFullscreen) {
                    gameWrapper.webkitRequestFullscreen();
                }
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }
        }

        window.addEventListener('load', init);
    </script>
</body>
</html>
