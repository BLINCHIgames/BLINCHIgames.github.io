<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>BLINCHIGAMES | Elite Game Library</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;800&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <!-- Adsterra Popunder Script -->
    <script src="https://pl28897342.effectivegatecpm.com/17/c4/34/17c434ad4a5c24351595e12ab0dcf7fa.js"></script>

    <!-- Google AdSense Main Script -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5157317095946191" crossorigin="anonymous"></script>

    <style>
        :root {
            --brand: #32ff0e;
            --brand-soft: rgba(50, 255, 14, 0.1);
            --bg-dark: #121212; 
            --sidebar: #181818;
            --surface: #202020;
            --surface-hover: #2a2a2a;
            --text-main: #f5f5f5;
            --text-secondary: #9a9a9a;
            --font-main: 'Plus Jakarta Sans', sans-serif;
            --font-display: 'Space Grotesk', sans-serif;
            --radius-lg: 12px;
            --radius-md: 8px;
            --transition: cubic-bezier(0.2, 0, 0, 1);
        }

        /* CUSTOM SCROLLBAR */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-dark);
        }
        ::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #444;
        }

        body { 
            background: var(--bg-dark); 
            color: var(--text-main);
            font-family: var(--font-main);
            margin: 0;
            overflow-x: hidden;
        }

        .app-container { display: flex; min-height: 100vh; }

        .sidebar {
            width: 240px;
            background: var(--sidebar);
            border-right: 1px solid rgba(255,255,255,0.03);
            height: 100vh;
            position: sticky;
            top: 0;
            display: flex;
            flex-direction: column;
            z-index: 1000;
        }

        .sidebar-header { padding: 25px 20px 15px; }
        .logo { 
            font-family: var(--font-display); 
            font-size: 1.25rem; 
            font-weight: 800; 
            color: #fff; 
            text-decoration: none;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .logo i { color: var(--brand); font-size: 1.5rem; }
        .logo span { color: var(--brand); }

        .search-box { padding: 0 15px 15px; }
        .search-input-wrapper {
            position: relative;
            background: #2a2a2a;
            border-radius: 4px;
            padding: 8px 12px;
            display: flex;
            align-items: center;
            border: 1px solid transparent;
            transition: 0.15s;
        }
        .search-input-wrapper:focus-within {
            background: #3a3a3a;
        }
        .search-input-wrapper input {
            background: transparent;
            border: none;
            color: white;
            font-size: 0.85rem;
            width: 100%;
            outline: none;
            margin-left: 8px;
        }
        .search-input-wrapper i { color: var(--text-secondary); }

        .menu-scroll { flex: 1; overflow-y: auto; padding: 10px 15px; }

        .menu-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-secondary);
            font-weight: 700;
            margin: 20px 15px 8px;
            opacity: 0.6;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 15px;
            color: var(--text-secondary);
            text-decoration: none !important;
            border-radius: 4px;
            font-weight: 500;
            font-size: 0.9rem;
            transition: all 0.15s;
            cursor: pointer;
            border: none;
            background: transparent;
            width: 100%;
            text-align: left;
            margin-bottom: 2px;
        }
        .nav-item:hover { color: #fff; background: #2a2a2a; }
        .nav-item.active { 
            color: #fff; 
            background: #353535; 
            font-weight: 600;
            box-shadow: inset 3px 0 0 var(--brand);
        }

        /* Ad Placement Area in Sidebar */
        .sidebar-ad-area {
            padding: 15px;
            border-top: 1px solid rgba(255,255,255,0.05);
            display: flex;
            justify-content: center;
            background: #111;
        }

        .main-content { flex: 1; min-width: 0; position: relative; padding-bottom: 100px; }

        #loading-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #121212; z-index: 2000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.6s ease;
        }

        .game-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); 
            gap: 25px; 
            padding: 20px; 
        }
        .elite-grid { grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); }

        .game-card {
            background: transparent;
            border-radius: var(--radius-md);
            overflow: hidden;
            transition: all 0.2s ease-in-out;
            cursor: pointer;
            position: relative;
        }
        .game-card:hover { transform: scale(1.02); }
        
        .game-thumb { 
            aspect-ratio: 1/1.3; 
            overflow: hidden; 
            position: relative;
            border-radius: 6px;
            background: var(--surface);
        }
        .game-thumb img { width: 100%; height: 100%; object-fit: cover; }
        .elite-grid .game-thumb { aspect-ratio: 16/9; }
        
        .game-info { padding: 10px 0; }
        .game-info h6 { 
            margin: 0; 
            font-size: 0.9rem; 
            font-weight: 600; 
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis;
            color: var(--text-main);
        }
        .game-category {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        .badge-elite { 
            position: absolute; top: 10px; left: 10px; background: #fff; color: #000;
            font-size: 0.6rem; font-weight: 800; padding: 2px 6px; border-radius: 2px; text-transform: uppercase;
            z-index: 2;
        }

        #scroll-sentinel { height: 150px; width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .sync-status { font-size: 0.75rem; color: var(--text-secondary); margin-top: 10px; }

        #game-stage { display: none; position: fixed; inset: 0; background: #000; z-index: 1500; }
        .stage-header { height: 50px; display: flex; align-items: center; padding: 0 20px; background: #121212; border-bottom: 1px solid #222; }
        .stage-body { display: flex; height: calc(100vh - 50px); }
        .iframe-container { flex: 1; position: relative; background: #000; }
        #stage-iframe { width: 100%; height: 100%; border: none; }

        .section-title {
            padding: 20px 20px 0;
            font-size: 1.1rem;
            font-weight: 700;
            text-transform: none;
            letter-spacing: -0.2px;
        }
    </style>
</head>
<body>

<div id="loading-overlay">
    <div class="text-center">
        <h2 class="logo mb-4" style="font-size: 2.5rem;"><i class="bi bi-controller"></i> BLINCHI<span>GAMES</span></h2>
        <div class="spinner-border text-light" style="width: 2rem; height: 2rem; border-width: 0.2em;" role="status"></div>
    </div>
</div>

<div class="app-container">
    <aside id="main-sidebar" class="sidebar">
        <div class="sidebar-header">
            <a href="#" class="logo" onclick="showSection('home')"><i class="bi bi-controller"></i> BLINCHI<span>GAMES</span></a>
        </div>

        <div class="search-box">
            <div class="search-input-wrapper">
                <i class="bi bi-search"></i>
                <input type="text" id="game-search" placeholder="Search" oninput="handleSearch()">
            </div>
        </div>
        
        <div class="menu-scroll">
            <div class="menu-label">Discover</div>
            <button class="nav-item active" id="btn-nav-home" onclick="showSection('home')">
                <i class="bi bi-compass"></i> Home
            </button>

            <div class="menu-label">Categories</div>
            <div id="category-nav-list"></div>
            
            <div class="menu-label">Links</div>
            <a href="https://www.tiktok.com/@blinchigames3" target="_blank" class="nav-item">
                <i class="bi bi-tiktok"></i> TikTok
            </a>
        </div>

        <!-- Adsterra Sidebar Banner -->
        <div class="sidebar-ad-area">
            <script type="text/javascript">
                atOptions = {
                    'key' : '6e1109cad98d336d18e23b0a2087bbc8',
                    'format' : 'iframe',
                    'height' : 300,
                    'width' : 160,
                    'params' : {}
                };
            </script>
            <script type="text/javascript" src="https://www.highperformanceformat.com/6e1109cad98d336d18e23b0a2087bbc8/invoke.js"></script>
        </div>
    </aside>

    <main class="main-content">
        <div id="view-home" class="view-section">
            <h5 class="section-title">Elite Collection</h5>
            <div id="elite-games-container" class="game-grid elite-grid"></div>

            <h5 class="section-title" id="main-library-title">Browse Library</h5>
            <div id="library-preview" class="game-grid"></div>
        </div>

        <div id="view-category" class="view-section" style="display:none">
            <h5 id="category-title" class="section-title"></h5>
            <div id="category-games-container" class="game-grid"></div>
        </div>

        <div id="scroll-sentinel">
            <div class="spinner-border text-secondary spinner-border-sm" role="status"></div>
            <div class="sync-status" id="bg-sync-info">Loading Catalog...</div>
        </div>
    </main>
</div>

<div id="game-stage">
    <div class="stage-header">
        <button class="btn btn-link text-light text-decoration-none p-0 me-3" onclick="closeGame()"><i class="bi bi-x-lg"></i></button>
        <span id="active-game-title" class="fw-bold small text-secondary"></span>
    </div>
    <div class="stage-body">
        <div class="iframe-container">
            <iframe id="stage-iframe" src="" allow="autoplay; fullscreen; keyboard" allowfullscreen></iframe>
        </div>
    </div>
</div>

<script>
    const eliteGames = [
        { id: 'basketrandom', title: 'Basket Random', url: 'https://basketrandom.github.io/', thumb: 'https://img.gamemonetize.com/9v4n4c7u9r0n0m1a2b3c4d5e6f7g8h9i/512x384.jpg', category: 'Sports' },
        { id: 'supermario', title: 'Super Mario', url: 'https://mukeshkmr776.github.io/super-mario/', thumb: 'https://img.gamemonetize.com/ykl7foe8q8olus573dq1zubicm5rbbz2/512x384.jpg', category: 'Arcade' },
        { id: 'majestic', title: 'Majestic Games', url: 'https://majesticwafr.github.io', thumb: 'https://img.gamemonetize.com/f5mv3cltk9bjta0h3t54c1isiqwlxgf3/512x384.jpg', category: 'Action' },
        { id: 'retrobowl', title: 'Retro Bowl', url: 'https://game316422.konggames.com/gameframe/index.html?key=316422', thumb: 'https://img.gamemonetize.com/497e2c9f9f9e4f0f8a3d5e3f3e3e3e3e/512x384.jpg', category: 'Sports' },
        { id: 'deathloop', title: 'Death Loop (Danganronpa)', url: 'https://itch.io/embed-upload/11266205?color=000000', thumb: 'https://img.itch.zone/aW1nLzE3Njg1NDUyLnBuZw==/315x250%23c/9f%2BFuB.png', category: 'Adventure' },
        { id: 'dungeon', title: 'Die in the Dungeon', url: 'https://itch.io/embed-upload/3796541?color=000000', thumb: 'https://img.itch.zone/aW1nLzUzODU0MzIucG5n/315x250%23c/X%2F%2F%2FRq.png', category: 'Strategy' }
    ];

    let fullCatalog = []; 
    let currentFilteredView = []; 
    let activeView = 'home';
    let loadedCount = 0; 
    
    const INITIAL_CATALOG_LIMIT = 100;
    const SCROLL_BATCH_SIZE = 30;
    
    const feeds = ['rssfeed.php.json', 'rssfeed2.php', 'rssfeed3.php', 'rssfeed4.php', 'rssfeed5.php'];
    const seenIds = new Set(eliteGames.map(g => g.id));

    async function init() {
        const eliteContainer = document.getElementById('elite-games-container');
        eliteGames.forEach(g => eliteContainer.innerHTML += createCardHTML(g, true));

        const fetchPromises = feeds.map(url => fetch(url).then(r => r.json()).catch(() => []));
        const results = await Promise.all(fetchPromises);
        
        results.forEach(data => {
            if (Array.isArray(data)) {
                data.forEach(g => {
                    if (g && g.id && !seenIds.has(g.id)) {
                        fullCatalog.push(g);
                        seenIds.add(g.id);
                    }
                });
            }
        });

        currentFilteredView = [...fullCatalog];
        loadMoreGames('library-preview', INITIAL_CATALOG_LIMIT);

        renderMenu();
        initInfiniteScroll();
        
        setTimeout(() => {
            document.getElementById('loading-overlay').style.opacity = '0';
            setTimeout(() => document.getElementById('loading-overlay').style.display = 'none', 600);
        }, 1000);
    }

    function renderMenu() {
        const menu = document.getElementById('category-nav-list');
        const cats = ['Action', 'Arcade', 'Driving', 'Puzzle', 'Shooting', 'Sports'];
        cats.forEach(cat => {
            const btn = document.createElement('button');
            btn.className = 'nav-item';
            btn.id = `nav-cat-${cat.toLowerCase()}`;
            btn.innerHTML = `<i class="bi bi-grid-fill"></i> ${cat}`;
            btn.onclick = () => showCategory(cat);
            menu.appendChild(btn);
        });
    }

    function handleSearch() {
        const query = document.getElementById('game-search').value.toLowerCase().trim();
        showSection('home');
        const container = document.getElementById('library-preview');
        container.innerHTML = '';
        
        if (query === "") {
            document.getElementById('main-library-title').innerText = "Browse Library";
            currentFilteredView = [...fullCatalog];
        } else {
            document.getElementById('main-library-title').innerText = `Search results for "${query}"`;
            currentFilteredView = fullCatalog.filter(g => g.title.toLowerCase().includes(query));
        }
        
        loadedCount = 0;
        loadMoreGames('library-preview', INITIAL_CATALOG_LIMIT);
    }

    function showSection(section) {
        activeView = section;
        document.querySelectorAll('.view-section').forEach(v => v.style.display = 'none');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        
        if(section === 'home') {
            document.getElementById('view-home').style.display = 'block';
            document.getElementById('btn-nav-home').classList.add('active');
            if (document.getElementById('game-search').value === "") {
                 currentFilteredView = [...fullCatalog];
                 loadedCount = document.getElementById('library-preview').children.length;
            }
        }
    }

    function showCategory(cat) {
        activeView = 'category';
        document.getElementById('game-search').value = "";
        document.querySelectorAll('.view-section').forEach(v => v.style.display = 'none');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(`nav-cat-${cat.toLowerCase()}`).classList.add('active');

        const view = document.getElementById('view-category');
        const container = document.getElementById('category-games-container');
        view.style.display = 'block';
        document.getElementById('category-title').innerText = cat;
        container.innerHTML = '';
        
        currentFilteredView = fullCatalog.filter(g => (g.category || '').toLowerCase().includes(cat.toLowerCase()));
        
        loadedCount = 0;
        loadMoreGames('category-games-container', INITIAL_CATALOG_LIMIT);
        window.scrollTo(0,0);
    }

    function loadMoreGames(containerId, limit) {
        const container = document.getElementById(containerId);
        if (!container) return;

        const nextBatch = currentFilteredView.slice(loadedCount, loadedCount + limit);
        
        if (nextBatch.length === 0) {
            document.getElementById('scroll-sentinel').style.visibility = 'hidden';
            return;
        }
        
        document.getElementById('scroll-sentinel').style.visibility = 'visible';
        let html = '';
        nextBatch.forEach(g => html += createCardHTML(g));
        container.insertAdjacentHTML('beforeend', html);
        loadedCount += nextBatch.length;

        if (loadedCount >= currentFilteredView.length) {
            document.getElementById('scroll-sentinel').style.visibility = 'hidden';
        }
    }

    function initInfiniteScroll() {
        const sentinel = document.getElementById('scroll-sentinel');
        const observer = new IntersectionObserver((entries) => {
            if (entries[0].isIntersecting && loadedCount < currentFilteredView.length) {
                const targetId = activeView === 'home' ? 'library-preview' : 'category-games-container';
                loadMoreGames(targetId, SCROLL_BATCH_SIZE);
            }
        }, { rootMargin: '600px' });
        observer.observe(sentinel);
    }

    function createCardHTML(game, isElite = false) {
        const displayCategory = game.category || 'Game';
        return `
            <div class="game-card" onclick="openGame('${game.url}', '${game.title.replace(/'/g, "\\'")}')">
                <div class="game-thumb">
                    ${isElite ? '<div class="badge-elite">Elite</div>' : ''}
                    <img src="${game.thumb}" alt="${game.title}" loading="lazy" onerror="this.src='https://placehold.co/300x400/202020/32ff0e?text=Game'">
                </div>
                <div class="game-info">
                    <h6>${game.title}</h6>
                    <div class="game-category">${displayCategory}</div>
                </div>
            </div>
        `;
    }

    function openGame(url, title) {
        document.getElementById('game-stage').style.display = 'block';
        document.getElementById('stage-iframe').src = url;
        document.getElementById('active-game-title').innerText = title;
        document.body.style.overflow = 'hidden';
    }

    function closeGame() {
        document.getElementById('game-stage').style.display = 'none';
        document.getElementById('stage-iframe').src = '';
        document.body.style.overflow = '';
    }

    window.addEventListener('load', init);
</script>

</body>
</html>
