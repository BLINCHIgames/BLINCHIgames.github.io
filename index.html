    <!-- Popunder — fires once per day -->
    <script>
        (function () {
            const KEY     = 'blinchi_last_popunder';
            const ONE_DAY = 24 * 60 * 60 * 1000;
            const last    = parseInt(localStorage.getItem(KEY) || '0', 10);
            if (Date.now() - last >= ONE_DAY) {
                const s = document.createElement('script');
                s.src   = 'https://authoritieswoundjoint.com/17/c4/34/17c434ad4a5c24351595e12ab0dcf7fa.js';
                s.async = true;
                document.head.appendChild(s);
                localStorage.setItem(KEY, String(Date.now()));
            }
        })();
    </script>

    <!-- Social Ads — fires once per 20 minutes, never more -->
    <script>
        (function () {
            const KEY      = 'blinchi_last_social_ad';
            const COOLDOWN = 20 * 60 * 1000;
            function fireAd() {
                const script = document.createElement('script');
                script.src   = 'https://authoritieswoundjoint.com/be/12/e6/be12e6213defb10285de3a59a17f3b40.js';
                script.async = true;
                document.head.appendChild(script);
                localStorage.setItem(KEY, String(Date.now()));
            }
            function maybeFireAd() {
                const last = parseInt(localStorage.getItem(KEY) || '0', 10);
                if (Date.now() - last >= COOLDOWN) fireAd();
            }
            maybeFireAd();
            setInterval(maybeFireAd, COOLDOWN);
        })();
    </script>

<script>
// ─── Elite hand-picked games ─────────────────────────────────────────────────
const ELITE_LIST = [
    { title: 'Majestic Games', category: 'Elite',        url: 'https://majesticwafr.github.io',      thumb: 'https://img.gamemonetize.com/f5mv3cltk9bjta0h3t54c1isiqwlxgf3/512x384.jpg' },
    { title: 'Poxel.io',       category: 'Elite IO',     url: 'https://poxel.io/',                    thumb: '' },
    { title: 'Speed Stars 2',  category: 'Elite Racing', url: 'https://speedstars2.io/',              thumb: '' },
    { title: 'Basket Random',  category: 'Elite Sports', url: 'https://basketrandom.github.io/',      thumb: '' },
];

const GENRES     = ['Action', 'Arcade', 'Racing', 'Puzzle', 'Shooting', 'Sports', 'IO Games'];
const PAGE_INIT  = 100;
const PAGE_STEP  = 20;

let masterCatalog = [];
let activeList    = [];
let itemsLoaded   = 0;
let viewMode      = 'home';
let observer      = null;
let currentGame   = null;

// ─── Vote storage (localStorage per browser) ─────────────────────────────────
function getLikes(t)    { return parseInt(localStorage.getItem('vl_' + t) || '0', 10); }
function getDislikes(t) { return parseInt(localStorage.getItem('vd_' + t) || '0', 10); }
function getMyVote(t)   { return localStorage.getItem('vm_' + t) || ''; }

function setVote(title, type) {
    const prev = getMyVote(title);
    if (prev === type) return;
    if (prev === 'like')    localStorage.setItem('vl_' + title, Math.max(0, getLikes(title)    - 1));
    if (prev === 'dislike') localStorage.setItem('vd_' + title, Math.max(0, getDislikes(title) - 1));
    if (type === 'like')    localStorage.setItem('vl_' + title, getLikes(title)    + 1);
    if (type === 'dislike') localStorage.setItem('vd_' + title, getDislikes(title) + 1);
    localStorage.setItem('vm_' + title, type);
}

// ─── Boot ─────────────────────────────────────────────────────────────────────
async function boot() {
    const eg = document.getElementById('elite-grid');
    ELITE_LIST.forEach(g => eg.innerHTML += generateCard(g, true));

    const feedUrls = [
        'embed.json', 'g_min.json', 'rssfeed.php.json',
        'rssfeed2.php', 'rssfeed3.php', 'rssfeed4.php', 'rssfeed5.php',
        'Gamepix.json',
        'https://gamemonetize.com/feed.php?format=0&page=20',
        'https://feeds.gamepix.com/v2/json?sid=7L022&pagination=96&page=1',
        'https://feeds.gamepix.com/v2/json?sid=7L022&pagination=96&page=2',
        'https://feeds.gamepix.com/v2/json?sid=7L022&pagination=96&page=3',
        'https://feeds.gamepix.com/v2/json?sid=7L022&pagination=96&page=4',
        'https://feeds.gamepix.com/v2/json?sid=7L022&pagination=96&page=5',
    ];

    const results = await Promise.all(
        feedUrls.map(url => fetch(url).then(r => r.json()).catch(() => []))
    );

    masterCatalog = [...ELITE_LIST];

    results.forEach((data, idx) => {
        const url = feedUrls[idx];

        if (url.includes('g_min.json')) {
            if (!Array.isArray(data)) return;
            data.forEach(g => {
                if (!g.link || g.custom) return;
                const gameUrl = g.link.startsWith('http://') ? g.link.replace('http://', 'https://') : g.link;
                masterCatalog.push({ title: g.name || 'Game', url: gameUrl, thumb: g.image || '', category: Array.isArray(g.categories) ? g.categories[0] : (g.categories || 'Web Game') });
            });
            return;
        }

        if (url.includes('gamepix.com') || url.includes('Gamepix.json')) {
            const items = Array.isArray(data) ? data : (data.data || data.items || []);
            items.forEach(g => {
                let gameUrl = (g.url || '').replace('http://', 'https://');
                if (gameUrl && !gameUrl.includes('/embed')) gameUrl = gameUrl.replace(/\/$/, '') + '/embed?ref=blinchigames.online';
                else if (gameUrl && !gameUrl.includes('ref=')) gameUrl += (gameUrl.includes('?') ? '&' : '?') + 'ref=blinchigames.online';
                masterCatalog.push({ title: g.title || g.name || 'Game', url: gameUrl, thumb: g.url_thumbnail || g.banner_image || g.image || g.thumb || '', category: Array.isArray(g.categories) ? g.categories[0] : (g.category || 'Web Game') });
            });
            return;
        }

        if (!Array.isArray(data)) return;
        data.forEach(g => {
            let gameUrl = g.embed || g.url || g.link || '';
            if (!gameUrl) return;
            if (gameUrl.startsWith('http://')) gameUrl = gameUrl.replace('http://', 'https://');
            masterCatalog.push({ title: g.title || g.name || 'Game', url: gameUrl, thumb: g.image || g.thumb || '', category: ((g.tags || g.category || g.categories || 'Web Game') + '').split(',')[0].trim() });
        });
    });

    const seen = new Set();
    masterCatalog = masterCatalog.filter(g => {
        const key = (g.title || '').toLowerCase();
        return seen.has(key) ? false : seen.add(key);
    });

    initNav();
    showHome();
    setTimeout(() => { document.getElementById('loading-overlay').style.display = 'none'; }, 500);

    sizeIframe();
    window.addEventListener('resize', sizeIframe);
}

function sizeIframe() {
    const ifr    = document.getElementById('stage-iframe');
    const banner = document.getElementById('stage-banner');
    if (!ifr) return;
    const bannerH  = banner.classList.contains('collapsed') ? 0 : (banner.offsetHeight || 96);
    const available = window.innerHeight - bannerH - 60; // 60 = header
    // Use 85% of available height — much bigger game screen
    ifr.style.height = Math.max(400, Math.round(available * 0.85)) + 'px';
}

// ─── Nav ──────────────────────────────────────────────────────────────────────
function initNav() {
    const container = document.getElementById('cat-nav-container');
    container.innerHTML = '';
    GENRES.forEach(cat => {
        const b = document.createElement('button');
        b.className = 'nav-item';
        b.dataset.genre = cat;
        b.innerHTML = `<i class="bi bi-caret-right-fill"></i> <span>${cat}</span>`;
        b.onclick = () => filterByGenre(cat, b);
        container.appendChild(b);
    });
}

function hideAllViews() {
    document.getElementById('view-home').style.display   = 'none';
    document.getElementById('view-cat').style.display    = 'none';
    document.getElementById('view-search').style.display = 'none';
}
function setActiveNav(btn) {
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    if (btn) btn.classList.add('active');
}

function showHome() {
    viewMode = 'home'; itemsLoaded = 0; singleAdInjected = false;
    hideAllViews();
    document.getElementById('view-home').style.display  = 'block';
    document.getElementById('home-grid').innerHTML      = '';
    document.getElementById('main-lib-title').innerText = 'Global Library';
    setActiveNav(document.getElementById('btn-home'));
    activeList = [...masterCatalog];
    renderBatch(PAGE_INIT);
    resetObserver();
    window.scrollTo(0, 0);
}
function showSection(type, btn) {
    document.getElementById('game-search').value = '';
    showHome();
    setActiveNav(btn || document.getElementById('btn-home'));
}

function filterByGenre(genre, btn) {
    viewMode = 'cat'; itemsLoaded = 0;
    hideAllViews();
    document.getElementById('view-cat').style.display      = 'block';
    document.getElementById('cat-display-title').innerText = genre + ' Collection';
    document.getElementById('cat-grid').innerHTML          = '';
    setActiveNav(btn);
    const q = genre.toLowerCase().replace(' games', '').trim();
    activeList = masterCatalog.filter(g => (g.category || '').toLowerCase().includes(q) || (g.title || '').toLowerCase().includes(q));
    renderBatch(PAGE_INIT);
    resetObserver();
    window.scrollTo(0, 0);
}

function handleSearch() {
    const query = document.getElementById('game-search').value.toLowerCase().trim();
    if (!query) { showHome(); return; }
    viewMode = 'search'; itemsLoaded = 0;
    hideAllViews();
    document.getElementById('view-search').style.display      = 'block';
    document.getElementById('search-display-title').innerText = `Search Results: "${query}"`;
    document.getElementById('search-grid').innerHTML          = '';
    setActiveNav(null);
    activeList = masterCatalog.filter(g => (g.title || '').toLowerCase().includes(query) || (g.category || '').toLowerCase().includes(query));
    renderBatch(PAGE_INIT);
    resetObserver();
}

// ─── Render ───────────────────────────────────────────────────────────────────
function getActiveGrid() {
    if (viewMode === 'home')   return document.getElementById('home-grid');
    if (viewMode === 'cat')    return document.getElementById('cat-grid');
    if (viewMode === 'search') return document.getElementById('search-grid');
}

let singleAdInjected = false;

function renderBatch(count) {
    const grid  = getActiveGrid();
    const batch = activeList.slice(itemsLoaded, itemsLoaded + count);

    batch.forEach(g => {
        const wrapper = document.createElement('div');
        wrapper.innerHTML = generateCard(g);
        grid.appendChild(wrapper.firstElementChild);
    });

    itemsLoaded += batch.length;
    document.getElementById('scroll-sentinel').style.visibility =
        itemsLoaded < activeList.length ? 'visible' : 'hidden';
}

function resetObserver() {
    if (observer) observer.disconnect();
    observer = new IntersectionObserver(entries => {
        if (entries[0].isIntersecting && itemsLoaded < activeList.length) renderBatch(PAGE_STEP);
    }, { rootMargin: '400px' });
    observer.observe(document.getElementById('scroll-sentinel'));
}

// ─── Card (library — no like/dislike) ────────────────────────────────────────
function generateCard(g, isElite = false) {
    const img       = (g.thumb && g.thumb !== '') ? g.thumb : 'https://placehold.co/400x400/111/32ff0e?text=Elite+Game';
    const safeTitle = (g.title    || '').replace(/\\/g, '\\\\').replace(/'/g, "\\'");
    const safeUrl   = (g.url      || '').replace(/\\/g, '\\\\').replace(/'/g, "\\'");
    const safeCat   = (g.category || '').replace(/'/g, "\\'");
    return `
        <div class="game-card" onclick="launchGame('${safeUrl}','${safeTitle}','${safeCat}')">
            <div class="game-thumb">
                ${isElite ? '<div class="badge-elite">Elite</div>' : ''}
                <img src="${img}" alt="${g.title || ''}" loading="lazy">
            </div>
            <div class="game-info">
                <h6>${g.title || ''}</h6>
            </div>
        </div>`;
}

// ─── Voting on library cards ──────────────────────────────────────────────────
function voteCard(btn, type, title) {
    setVote(title, type);
    const bar = btn.closest('.like-bar');
    const lb  = bar.querySelector('.like-btn');
    const db  = bar.querySelector('.dislike-btn');
    const mv  = getMyVote(title);
    lb.classList.toggle('active', mv === 'like');
    db.classList.toggle('active', mv === 'dislike');
    lb.querySelector('span').textContent = getLikes(title);
    db.querySelector('span').textContent = getDislikes(title);
    if (currentGame && currentGame.title === title) updateStageLikeBar();
}

// ─── Voting inside the stage ─────────────────────────────────────────────────
function voteGame(type) {
    if (!currentGame) return;
    setVote(currentGame.title, type);
    updateStageLikeBar();
}
function updateStageLikeBar() {
    if (!currentGame) return;
    const t  = currentGame.title;
    const mv = getMyVote(t);
    document.getElementById('stage-like-btn').classList.toggle('active',    mv === 'like');
    document.getElementById('stage-dislike-btn').classList.toggle('active', mv === 'dislike');
    document.getElementById('stage-like-count').textContent    = getLikes(t);
    document.getElementById('stage-dislike-count').textContent = getDislikes(t);
}

// ─── Launch game ──────────────────────────────────────────────────────────────
let gamesPlayedCount = 0;

function launchGame(url, title, category) {
    currentGame = { url, title, category };
    gamesPlayedCount++;

    // Every 17 games, clear accumulated DOM/memory without touching localStorage
    if (gamesPlayedCount % 17 === 0) {
        cleanPortalCache();
    }

    document.getElementById('game-stage').classList.add('open');
    document.getElementById('stage-iframe').src      = url;
    document.getElementById('stage-title').innerText = 'PLAYING: ' + title;
    document.body.style.overflow = 'hidden';
    updateStageLikeBar();
    renderRelated(title, category);
    sizeIframe();
    // Scroll the stage overlay to top
    document.getElementById('game-stage').scrollTop = 0;
}

function closeGame() {
    document.getElementById('game-stage').classList.remove('open');
    // Fully unload the game iframe to free memory
    const ifr = document.getElementById('stage-iframe');
    ifr.src = 'about:blank';
    setTimeout(() => { ifr.src = ''; }, 100);
    document.body.style.overflow = '';
    currentGame = null;
    // Clear related grid DOM to free memory
    document.getElementById('related-grid').innerHTML = '';
    // Purge any blob/object URLs the browser may have cached for this session
    cleanPortalCache();
}

// ─── Portal cache cleaner — clears rendering/script cache without touching game saves ──
function cleanPortalCache() {
    // Remove stale script tags injected by ad refreshes (keep only the live ones)
    document.querySelectorAll('script[data-ad-injected]').forEach(s => s.remove());
    // Force GC hint by briefly toggling a style
    const body = document.body;
    body.style.display = 'none';
    // eslint-disable-next-line no-unused-expressions
    body.offsetHeight; // reflow
    body.style.display = '';
}

// ─── Related games ────────────────────────────────────────────────────────────
function renderRelated(title, category) {
    const grid = document.getElementById('related-grid');
    grid.innerHTML = '';
    const cat = (category || '').toLowerCase();
    const related = masterCatalog
        .filter(g => g.title !== title &&
            ((g.category || '').toLowerCase() === cat ||
             (g.category || '').toLowerCase().includes(cat) ||
             cat.includes((g.category || '').toLowerCase())))
        .slice(0, 18);

    if (!related.length) {
        grid.innerHTML = '<p style="color:#555;font-size:0.9rem;">No related games found.</p>';
        return;
    }
    related.forEach(g => {
        const img     = (g.thumb && g.thumb !== '') ? g.thumb : 'https://placehold.co/400x400/111/32ff0e?text=Game';
        const st      = (g.title    || '').replace(/\\/g, '\\\\').replace(/'/g, "\\'");
        const su      = (g.url      || '').replace(/\\/g, '\\\\').replace(/'/g, "\\'");
        const sc      = (g.category || '').replace(/'/g, "\\'");
        const el      = document.createElement('div');
        el.className  = 'game-card';
        el.innerHTML  = `
            <div class="game-thumb" onclick="launchGame('${su}','${st}','${sc}')">
                <img src="${img}" alt="${g.title||''}" loading="lazy">
            </div>
            <div class="game-info">
                <h6 onclick="launchGame('${su}','${st}','${sc}')">${g.title||''}</h6>
            </div>`;
        grid.appendChild(el);
    });
}

// ─── Fullscreen with banner-collapse prompt ───────────────────────────────────
function handleFullscreen() {
    const banner = document.getElementById('stage-banner');
    if (!banner.classList.contains('collapsed')) {
        document.getElementById('fs-prompt').style.display = 'flex';
    } else {
        doFullscreen();
    }
}
function fsPromptYes() {
    document.getElementById('fs-prompt').style.display = 'none';
    collapseBanner();
    doFullscreen();
}
function fsPromptNo() {
    document.getElementById('fs-prompt').style.display = 'none';
    doFullscreen();
}
function doFullscreen() {
    const ifr = document.getElementById('stage-iframe');
    if      (ifr.requestFullscreen)       ifr.requestFullscreen();
    else if (ifr.webkitRequestFullscreen) ifr.webkitRequestFullscreen();
    else if (ifr.msRequestFullscreen)     ifr.msRequestFullscreen();
}

function collapseBanner() {
    document.getElementById('stage-banner').classList.add('collapsed');
    document.getElementById('banner-expand-strip').style.display = 'block';
    sizeIframe();
}
function expandBanner() {
    document.getElementById('stage-banner').classList.remove('collapsed');
    document.getElementById('banner-expand-strip').style.display = 'none';
    sizeIframe();
}

window.onload = boot;
</script>
