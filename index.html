<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>BLINCHIGAMES | Elite Game Library</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5157317095946191" crossorigin="anonymous"></script>

<style>

:root{
--brand:#32ff0e;
--brand-soft:rgba(50,255,14,.1);
--bg-dark:#050505;
--sidebar:#0b0b0b;
--surface:#111;
--text-main:#fff;
--text-secondary:#888;
--font-main:'Plus Jakarta Sans',sans-serif;
--font-display:'Space Grotesk',sans-serif;
--radius-md:16px;
}

body{
background:var(--bg-dark);
color:var(--text-main);
font-family:var(--font-main);
margin:0;
overflow-x:hidden;
}

.app-container{display:flex;min-height:100vh;}

.sidebar{
width:280px;
background:var(--sidebar);
border-right:1px solid rgba(255,255,255,.05);
height:100vh;
position:sticky;
top:0;
display:flex;
flex-direction:column;
}

.sidebar-header{padding:30px 25px 15px;}

.logo{
font-family:var(--font-display);
font-size:1.5rem;
font-weight:800;
color:#fff;
text-decoration:none;
}

.logo span{color:var(--brand);}

.search-box{padding:0 15px 15px;}

.search-input-wrapper{
background:rgba(255,255,255,.05);
border-radius:12px;
padding:8px 12px;
display:flex;
align-items:center;
}

.search-input-wrapper input{
background:transparent;
border:none;
color:white;
font-size:.85rem;
width:100%;
outline:none;
margin-left:8px;
}

.menu-scroll{flex:1;overflow-y:auto;padding:10px 15px;}

.nav-item{
display:flex;
align-items:center;
gap:12px;
padding:12px 18px;
color:var(--text-secondary);
border-radius:12px;
font-weight:600;
font-size:.9rem;
cursor:pointer;
border:none;
background:transparent;
width:100%;
text-align:left;
}

.nav-item:hover{color:#fff;background:rgba(255,255,255,.05);}
.nav-item.active{color:var(--brand);background:var(--brand-soft);}

.main-content{flex:1;min-width:0;}

.game-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
gap:20px;
padding:20px;
}

.elite-grid{
grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
}

.game-card{
background:var(--surface);
border-radius:var(--radius-md);
overflow:hidden;
border:1px solid rgba(255,255,255,.05);
cursor:pointer;
transition:.25s;
}

.game-card:hover{
transform:translateY(-4px);
border-color:var(--brand);
}

.game-thumb{
aspect-ratio:16/10;
overflow:hidden;
}

.game-thumb img{
width:100%;
height:100%;
object-fit:cover;
}

.game-info{padding:12px;}
.game-info h6{margin:0;font-size:.85rem;font-weight:700;}

.badge-elite{
position:absolute;
top:10px;
left:10px;
background:var(--brand);
color:#000;
font-size:.6rem;
font-weight:900;
padding:3px 8px;
border-radius:4px;
}

#game-stage{
display:none;
position:fixed;
inset:0;
background:#000;
z-index:1500;
}

.stage-header{
height:60px;
display:flex;
align-items:center;
padding:0 20px;
background:#111;
border-bottom:1px solid #222;
}

.stage-body{
display:grid;
grid-template-columns:180px 1fr 180px;
gap:12px;
height:calc(100vh - 60px);
padding:10px;
}

.iframe-container{
background:#000;
border-radius:10px;
overflow:hidden;
}

#stage-iframe{
width:100%;
height:100%;
border:none;
}

.side-ad{
display:flex;
justify-content:center;
align-items:flex-start;
}

.ad-box{
background:#0c0c0c;
border:1px solid rgba(255,255,255,.05);
border-radius:12px;
padding:8px;
}

@media(max-width:900px){

.stage-body{
grid-template-columns:1fr;
}

.side-ad{
display:none;
}

}

</style>
</head>

<body>

<div class="app-container">

<aside class="sidebar">

<div class="sidebar-header">
<a href="#" class="logo" onclick="showSection('home')">BLINCHI<span>GAMES</span></a>
</div>

<div class="search-box">
<div class="search-input-wrapper">
<i class="bi bi-search"></i>
<input type="text" id="game-search" placeholder="Search games..." oninput="handleSearch()">
</div>
</div>

<div class="menu-scroll">

<button class="nav-item active" id="btn-nav-home" onclick="showSection('home')">
<i class="bi bi-house-door"></i> Home
</button>

</div>

</aside>

<main class="main-content">

<div id="view-home">

<h2 class="mb-4 fw-bold">Elite Collection</h2>

<div id="elite-games-container" class="game-grid elite-grid"></div>

<h2 class="mb-4 fw-bold">Browse Library</h2>

<div id="library-preview" class="game-grid"></div>

</div>

</main>

</div>

<div id="game-stage">

<div class="stage-header">
<button class="btn btn-dark btn-sm me-3" onclick="closeGame()">Exit</button>
<span id="active-game-title"></span>
</div>

<div class="stage-body">

<div class="side-ad">
<div class="ad-box">

<script>
atOptions = {
'key' : '6e1109cad98d336d18e23b0a2087bbc8',
'format' : 'iframe',
'height' : 300,
'width' : 160,
'params' : {}
};
</script>
<script src="https://authoritieswoundjoint.com/6e1109cad98d336d18e23b0a2087bbc8/invoke.js"></script>

</div>
</div>

<div class="iframe-container">
<iframe id="stage-iframe" allowfullscreen></iframe>
</div>

<div class="side-ad">
<div class="ad-box">

<script async data-cfasync="false" src="https://authoritieswoundjoint.com/6e2b1a830401c523b5ff47a15d91df2c/invoke.js"></script>
<div id="container-6e2b1a830401c523b5ff47a15d91df2c"></div>

</div>
</div>

</div>

</div>

<script>

const eliteGames=[
{id:'basketrandom',title:'Basket Random',url:'https://basketrandom.github.io/',thumb:'https://img.gamemonetize.com/9v4n4c7u9r0n0m1a2b3c4d5e6f7g8h9i/512x384.jpg'},
{id:'supermario',title:'Super Mario',url:'https://mukeshkmr776.github.io/super-mario/',thumb:'https://img.gamemonetize.com/ykl7foe8q8olus573dq1zubicm5rbbz2/512x384.jpg'}
];

let fullCatalog=[];
let currentFilteredView=[];
let loadedCount=0;

function init(){

const eliteContainer=document.getElementById("elite-games-container");

eliteGames.forEach(g=>{
eliteContainer.innerHTML+=createCardHTML(g,true);
});

currentFilteredView=[...eliteGames];
loadMoreGames("library-preview",20);

}

function createCardHTML(game,isElite=false){

return `
<div class="game-card" onclick="openGame('${game.url}','${game.title}')">

<div class="game-thumb">

${isElite?'<div class="badge-elite">Elite</div>':''}

<img src="${game.thumb}" loading="lazy">

</div>

<div class="game-info">
<h6>${game.title}</h6>
</div>

</div>
`;

}

function openGame(url,title){

document.getElementById("game-stage").style.display="block";

document.getElementById("stage-iframe").src=url;

document.getElementById("active-game-title").innerText="Playing: "+title;

document.body.style.overflow="hidden";

}

function closeGame(){

document.getElementById("game-stage").style.display="none";

document.getElementById("stage-iframe").src="";

document.body.style.overflow="";

}

window.addEventListener("load",init);

</script>

</body>
</html>
