<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>BLINCHIGAMES | Elite Game Library</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;800&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5157317095946191" crossorigin="anonymous"></script>

    <style>
        :root {
            /* Epic Games Inspired Dark Charcoal Theme */
            --brand: #32ff0e;
            --brand-soft: rgba(50, 255, 14, 0.15);
            --bg-dark: #121214; /* Deep Charcoal Base */
            --sidebar: #18181c; /* Slightly lighter side panel */
            --surface: #202025; /* Card Background */
            --surface-hover: #2a2a32;
            --text-main: #f5f5f5;
            --text-secondary: #a0a0a5;
            --font-main: 'Plus Jakarta Sans', sans-serif;
            --font-display: 'Space Grotesk', sans-serif;
            --radius-lg: 16px;
            --radius-md: 12px;
            --transition: cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            background: var(--bg-dark);
            color: var(--text-main);
            font-family: var(--font-main);
            margin: 0;
            overflow-x: hidden;
        }

        /* --- LAYOUT --- */
        .app-container { display: flex; min-height: 100vh; }

        .sidebar {
            width: 280px;
            background: var(--sidebar);
            border-right: 1px solid rgba(255,255,255,0.05);
            height: 100vh;
            position: sticky;
            top: 0;
            display: flex;
            flex-direction: column;
            z-index: 1000;
        }

        .sidebar-header { padding: 30px 25px 15px; }
        .logo {
            font-family: var(--font-display);
            font-size: 1.6rem;
            font-weight: 800;
            color: #fff;
            text-decoration: none;
            letter-spacing: -1px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .logo span { color: var(--brand); }

        /* --- SEARCH --- */
        .search-box { padding: 0 20px 20px; }
        .search-input-wrapper {
            position: relative;
            background: var(--surface);
            border-radius: 8px;
            padding: 10px 14px;
            display: flex;
            align-items: center;
            border: 1px solid transparent;
            transition: 0.2s;
        }
        .search-input-wrapper:focus-within {
            border-color: var(--brand);
            background: var(--surface-hover);
        }
        .search-input-wrapper input {
            background: transparent;
            border: none;
            color: white;
            font-size: 0.9rem;
            width: 100%;
            outline: none;
            margin-left: 10px;
        }
        .search-input-wrapper i { color: var(--text-secondary); }

        /* --- NAVIGATION --- */
        .menu-scroll { flex: 1; overflow-y: auto; padding: 10px 15px; scrollbar-width: none; }
        .menu-scroll::-webkit-scrollbar { display: none; }

        .menu-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-secondary);
            font-weight: 800;
            margin: 20px 15px 10px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 18px;
            color: var(--text-secondary);
            text-decoration: none;
            border-radius: 8px;
            font-weight: 500;
            font-size: 0.95rem;
            transition: all 0.2s;
            cursor: pointer;
            border: none;
            background: transparent;
            width: 100%;
            text-align: left;
            margin-bottom: 4px;
        }
        .nav-item:hover { color: #fff; background: var(--surface); }
        .nav-item.active { 
            color: var(--brand); 
            background: var(--brand-soft); 
            border-left: 3px solid var(--brand);
            border-radius: 0 8px 8px 0;
            font-weight: 600;
        }

        /* --- MAIN CONTENT & GRIDS --- */
        .main-content { flex: 1; min-width: 0; position: relative; padding: 0 20px; }
        
        .section-title {
            font-family: var(--font-display);
            font-size: 1.5rem;
            letter-spacing: -0.5px;
            margin-top: 2rem;
        }

        .game-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); 
            gap: 24px; 
            padding: 10px 0 30px; 
        }
        .elite-grid { grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); }

        /* --- EPIC GAMES STYLE CARDS --- */
        .game-card {
            background: transparent;
            border-radius: var(--radius-md);
            transition: transform 0.3s var(--transition);
            cursor: pointer;
            position: relative;
            display: flex;
            flex-direction: column;
        }
        .game-card:hover { transform: scale(1.03); z-index: 2; }
        .game-card:hover .game-thumb img { filter: brightness(1.1); }
        
        .game-thumb { 
            aspect-ratio: 16/9; 
            overflow: hidden; 
            position: relative; 
            border-radius: var(--radius-md);
            background: var(--surface);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .game-thumb img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            transition: 0.3s;
        }

        .game-info { padding: 12px 4px; }
        .game-info h6 { 
            margin: 0; 
            font-size: 1rem; 
            font-weight: 600; 
            color: var(--text-main);
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis; 
        }
        .game-category-label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        .badge-elite {
            position: absolute; 
            top: 10px; 
            left: 10px; 
            background: var(--brand); 
            color: #000;
            font-size: 0.65rem; 
            font-weight: 800; 
            padding: 4px 10px; 
            border-radius: 4px; 
            text-transform: uppercase;
            box-shadow: 0 2px 10px rgba(50, 255, 14, 0.3);
            z-index: 2;
        }

        /* --- LOADING OVERLAY --- */
        #loading-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-dark); z-index: 2000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.6s ease;
        }
        .bouncy-logo { animation: bounce 0.8s infinite alternate; }
        @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-15px); } }

        #scroll-sentinel { height: 100px; width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .sync-status { font-size: 0.75rem; color: var(--text-secondary); margin-top: 12px; }

        /* --- GAME PLAY STAGE WITH AD SIDEBAR --- */
        #game-stage { display: none; position: fixed; inset: 0; background: var(--bg-dark); z-index: 1500; }
        .stage-header { 
            height: 60px; 
            display: flex; 
            align-items: center; 
            padding: 0 20px; 
            background: var(--sidebar); 
            border-bottom: 1px solid rgba(255,255,255,0.05); 
        }
        .stage-body { 
            display: flex; 
            height: calc(100vh - 60px); 
            flex-direction: row; 
        }
        .iframe-container { 
            flex: 1; 
            position: relative; 
            background: #000; 
        }
        #stage-iframe { width: 100%; height: 100%; border: none; }
        
        /* ADSTERRA SIDEBAR */
        .ad-sidebar {
            width: 300px; /* Fixed width for standard ad sizes */
            background: var(--sidebar);
            border-left: 1px solid rgba(255,255,255,0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 10px;
            gap: 20px;
            overflow-y: auto;
        }

        .ad-label {
            font-size: 0.65rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: -10px;
        }

        /* Responsive */
        @media (max-width: 992px) {
            .ad-sidebar { width: 200px; }
        }
        @media (max-width: 768px) {
            .app-container { flex-direction: column; }
            .sidebar { width: 100%; height: auto; position: relative; border-right: none; border-bottom: 1px solid rgba(255,255,255,0.05); }
            .menu-scroll { display: flex; overflow-x: auto; padding: 10px; }
            .menu-label { display: none; }
            .nav-item { white-space: nowrap; margin-right: 10px; border-radius: 8px; border-left: none; }
            .nav-item.active { border-left: none; border-bottom: 3px solid var(--brand); border-radius: 8px; }
            
            /* Stage responsive */
            .stage-body { flex-direction: column; }
            .ad-sidebar { 
                width: 100%; 
                height: auto; 
                flex-direction: row; 
                justify-content: center; 
                border-left: none; 
                border-top: 1px solid rgba(255,255,255,0.05); 
            }
        }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <div class="text-center">
            <h2 class="logo mb-4 bouncy-logo" style="font-size: 3rem; justify-content: center;">BLINCHI<span>GAMES</span></h2>
            <div class="spinner-border" style="color: var(--brand);" role="status"></div>
            <p class="text-secondary mt-3 small">Initializing Epic Catalog...</p>
        </div>
    </div>

    <div class="app-container">
        <aside id="main-sidebar" class="sidebar">
            <div class="sidebar-header">
                <a href="#" class="logo" onclick="showSection('home', document.getElementById('btn-nav-home'))">
                    <i class="bi bi-controller text-white"></i> BLINCHI<span>GAMES</span>
                </a>
            </div>

            <div class="search-box">
                <div class="search-input-wrapper">
                    <i class="bi bi-search"></i>
                    <input type="text" id="game-search" placeholder="Search store..." oninput="handleSearch()">
                </div>
            </div>

            <div class="menu-scroll">
                <div class="menu-label">Discover</div>
                <button class="nav-item active" id="btn-nav-home" onclick="showSection('home', this)">
                    <i class="bi bi-grid-fill"></i> Store Home
                </button>

                <div class="menu-label">Genres</div>
                <div id="category-nav-list"></div>

                <div class="menu-label">Socials</div>
                <a href="https://www.tiktok.com/@blinchigames3?lang=en" target="_blank" class="nav-item">
                    <i class="bi bi-tiktok"></i> TikTok
                </a>
            </div>
        </aside>

        <main class="main-content">
            <div id="view-home" class="view-section py-4">
                <h2 class="section-title fw-bold text-white mb-4">Featured Elite</h2>
                <div id="elite-games-container" class="game-grid elite-grid mb-5"></div>

                <h2 class="section-title fw-bold text-white mb-4" id="main-library-title">All Games</h2>
                <div id="library-preview" class="game-grid"></div>
            </div>

            <div id="view-category" class="view-section py-4" style="display:none">
                <h2 id="category-title" class="section-title fw-bold text-white mb-4"></h2>
                <div id="category-games-container" class="game-grid"></div>
            </div>

            <div id="scroll-sentinel">
                <div class="spinner-border spinner-border-sm" style="color: var(--brand);" role="status"></div>
                <div class="sync-status" id="bg-sync-info">Scanning Catalog...</div>
            </div>
        </main>
    </div>

    <div id="game-stage">
        <div class="stage-header">
            <button class="btn btn-dark btn-sm rounded-pill px-4 fw-bold me-3" style="background: var(--surface); border: none;" onclick="closeGame()">
                <i class="bi bi-chevron-left"></i> Back to Store
            </button>
            <span id="active-game-title" class="fw-bold text-uppercase small text-white"></span>
        </div>
        
        <div class="stage-body">
            <div class="iframe-container">
                <iframe id="stage-iframe" src="" allow="autoplay; fullscreen; keyboard" allowfullscreen></iframe>
            </div>
            
            <div class="ad-sidebar">
                <div class="ad-label">Advertisement</div>
                
                <script async="async" data-cfasync="false" src="https://authoritieswoundjoint.com/6e2b1a830401c523b5ff47a15d91df2c/invoke.js"></script>
                <div id="container-6e2b1a830401c523b5ff47a15d91df2c"></div>

                <div class="ad-label mt-3">Advertisement</div>

                <script>
                  atOptions = {
                    'key' : '6e1109cad98d336d18e23b0a2087bbc8',
                    'format' : 'iframe',
                    'height' : 300,
                    'width' : 160,
                    'params' : {}
                  };
                </script>
                <script src="https://authoritieswoundjoint.com/6e1109cad98d336d18e23b0a2087bbc8/invoke.js"></script>
            </div>
        </div>
    </div>

    <script>
        const eliteGames = [
            { id: 'basketrandom', title: 'Basket Random', category: 'Sports', url: 'https://basketrandom.github.io/', thumb: 'https://img.gamemonetize.com/9v4n4c7u9r0n0m1a2b3c4d5e6f7g8h9i/512x384.jpg' },
            { id: 'supermario', title: 'Super Mario', category: 'Arcade', url: 'https://mukeshkmr776.github.io/super-mario/', thumb: 'https://img.gamemonetize.com/ykl7foe8q8olus573dq1zubicm5rbbz2/512x384.jpg' },
            { id: 'majestic', title: 'Majestic Games', category: 'Action', url: 'https://majesticwafr.github.io', thumb: 'https://img.gamemonetize.com/f5mv3cltk9bjta0h3t54c1isiqwlxgf3/512x384.jpg' },
            { id: 'marduinoparty', title: 'Marduino Party', category: 'Party', url: 'https://www.hackster.io/gatoninja236/marduino-party-1-3dcda7/embed', thumb: 'https://img.gamemonetize.com/kk2f1i1jbnfvg87cu5d6pso2jj0mb7t7/512x384.jpg' },
            { id: 'retrobowl', title: 'Retro Bowl', category: 'Sports', url: 'https://game316422.konggames.com/gameframe/index.html?key=316422', thumb: 'https://img.gamemonetize.com/497e2c9f9f9e4f0f8a3d5e3f3e3e3e3e/512x384.jpg' },
            { id: 'deathloop', title: 'Death Loop', category: 'Puzzle', url: 'https://itch.io/embed-upload/11266205?color=000000', thumb: 'https://img.itch.zone/aW1nLzE3Njg1NDUyLnBuZw==/315x250%23c/9f%2BFuB.png' },
            { id: 'dungeon', title: 'Die in the Dungeon', category: 'Strategy', url: 'https://itch.io/embed-upload/3796541?color=000000', thumb: 'https://img.itch.zone/aW1nLzUzODU0MzIucG5n/315x250%23c/X%2F%2F%2FRq.png' },
            { id: 'littlechef', title: 'Little Chef', category: 'Simulation', url: 'https://itch.io/embed-upload/8133544?color=000000', thumb: 'https://img.itch.zone/aW1nLzEyMzk0MTk3LnBuZw==/315x250%23c/W0mO4H.png' }
        ];

        let rawFeedData = [];
        let fullCatalog = [];
        let currentFilteredView = [];

        let activeView = 'home';
        let loadedCount = 0;

        const INITIAL_CATALOG_LIMIT = 100;
        const SCROLL_BATCH_SIZE = 20;
        const BACKGROUND_LOAD_SIZE = 500;
        const BACKGROUND_TICK_MS = 5000;

        const feeds = ['rssfeed.php.json', 'rssfeed2.php', 'rssfeed3.php', 'rssfeed4.php', 'rssfeed5.php'];
        const seenIds = new Set(eliteGames.map(g => g.id));

        async function init() {
            const eliteContainer = document.getElementById('elite-games-container');
            eliteGames.forEach(g => eliteContainer.innerHTML += createCardHTML(g, true));

            // Aggregate ALL feeds
            const fetchPromises = feeds.map(url => fetch(url).then(r => r.json()).catch(() => []));
            const results = await Promise.all(fetchPromises);
            results.forEach(data => { if (Array.isArray(data)) rawFeedData.push(...data); });

            processBatch(rawFeedData.length);

            currentFilteredView = [...fullCatalog];
            loadMoreGames('library-preview', INITIAL_CATALOG_LIMIT);

            renderMenu();
            initInfiniteScroll();
            startBackgroundSync();

            setTimeout(() => {
                document.getElementById('loading-overlay').style.opacity = '0';
                setTimeout(() => document.getElementById('loading-overlay').style.display = 'none', 600);
            }, 1200);
        }

        function processBatch(count) {
            let processed = 0;
            for (let i = 0; i < rawFeedData.length; i++) {
                const g = rawFeedData[i];
                if (g && g.id && !seenIds.has(g.id)) {
                    // Normalize category if missing
                    if(!g.category) g.category = "Web Game"; 
                    fullCatalog.push(g);
                    seenIds.add(g.id);
                    processed++;
                    if (processed >= count) break;
                }
            }
            return processed;
        }

        function startBackgroundSync() {
            setInterval(() => {
                if (fullCatalog.length < rawFeedData.length) {
                    processBatch(BACKGROUND_LOAD_SIZE);
                    document.getElementById('bg-sync-info').innerText = `Catalog: ${fullCatalog.length} Total Games`;
                } else {
                    document.getElementById('bg-sync-info').innerText = `All ${fullCatalog.length} games loaded`;
                }
            }, BACKGROUND_TICK_MS);
        }

        function renderMenu() {
            const menu = document.getElementById('category-nav-list');
            const cats = ['Action', 'Arcade', 'Driving', 'Puzzle', 'Shooting', 'Sports'];
            cats.forEach(cat => {
                const btn = document.createElement('button');
                btn.className = 'nav-item';
                btn.innerHTML = `<span>${cat}</span>`;
                btn.onclick = function() { showCategory(cat, this); };
                menu.appendChild(btn);
            });
        }

        function handleSearch() {
            const query = document.getElementById('game-search').value.toLowerCase().trim();
            showSection('home', document.getElementById('btn-nav-home'));
            const container = document.getElementById('library-preview');
            container.innerHTML = '';

            if (query === "") {
                document.getElementById('main-library-title').innerText = "All Games";
                currentFilteredView = [...fullCatalog];
            } else {
                document.getElementById('main-library-title').innerText = `Search Results: "${query}"`;
                currentFilteredView = fullCatalog.filter(g => g.title.toLowerCase().includes(query));
            }

            loadedCount = 0;
            loadMoreGames('library-preview', INITIAL_CATALOG_LIMIT);
        }

        // Updated to handle Active Class highlighting
        function showSection(section, btnElement) {
            activeView = section;
            document.querySelectorAll('.view-section').forEach(v => v.style.display = 'none');
            
            // Clear active states
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            if(btnElement) btnElement.classList.add('active');

            if(section === 'home') {
                document.getElementById('view-home').style.display = 'block';
            }
        }

        // Updated to handle Active Class highlighting
        function showCategory(cat, btnElement) {
            showSection('category', btnElement);
            document.getElementById('game-search').value = "";
            
            const view = document.getElementById('view-category');
            const container = document.getElementById('category-games-container');
            document.getElementById('category-title').innerText = cat + " Games";
            container.innerHTML = '';

            currentFilteredView = fullCatalog.filter(g => (g.category || '').toLowerCase().includes(cat.toLowerCase()));

            loadedCount = 0;
            loadMoreGames('category-games-container', INITIAL_CATALOG_LIMIT);
            window.scrollTo(0,0);
        }

        function loadMoreGames(containerId, limit) {
            const container = document.getElementById(containerId);
            if (!container) return;

            const nextBatch = currentFilteredView.slice(loadedCount, loadedCount + limit);

            if (nextBatch.length === 0) {
                document.getElementById('scroll-sentinel').style.visibility = 'hidden';
                return;
            }

            document.getElementById('scroll-sentinel').style.visibility = 'visible';
            let html = '';
            nextBatch.forEach(g => html += createCardHTML(g));
            container.insertAdjacentHTML('beforeend', html);
            loadedCount += nextBatch.length;

            if (loadedCount >= currentFilteredView.length) {
                document.getElementById('scroll-sentinel').style.visibility = 'hidden';
            }
        }

        function initInfiniteScroll() {
            const sentinel = document.getElementById('scroll-sentinel');
            const observer = new IntersectionObserver((entries) => {
                if (entries[0].isIntersecting && loadedCount < currentFilteredView.length) {
                    const targetId = activeView === 'home' ? 'library-preview' : 'category-games-container';
                    loadMoreGames(targetId, SCROLL_BATCH_SIZE);
                }
            }, { rootMargin: '400px' });
            observer.observe(sentinel);
        }

        function createCardHTML(game, isElite = false) {
            const catLabel = game.category ? game.category : "Web Game";
            return `
                <div class="game-card" onclick="openGame('${game.url}', '${game.title.replace(/'/g, "\\'")}')">
                    <div class="game-thumb">
                        ${isElite ? '<div class="badge-elite">Elite</div>' : ''}
                        <img src="${game.thumb}" alt="${game.title}" loading="lazy" onerror="this.src='https://placehold.co/600x337/202025/32ff0e?text=No+Image'">
                    </div>
                    <div class="game-info">
                        <h6>${game.title}</h6>
                        <div class="game-category-label">${catLabel}</div>
                    </div>
                </div>
            `;
        }

        function openGame(url, title) {
            document.getElementById('game-stage').style.display = 'block';
            document.getElementById('stage-iframe').src = url;
            document.getElementById('active-game-title').innerText = `${title}`;
            document.body.style.overflow = 'hidden';
        }

        function closeGame() {
            document.getElementById('game-stage').style.display = 'none';
            document.getElementById('stage-iframe').src = '';
            document.body.style.overflow = '';
        }

        window.addEventListener('load', init);
    </script>
</body>
</html>
